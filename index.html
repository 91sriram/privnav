/* ── GPS ───────────────────────────────────────────── */
function startGps() {
  if (!navigator.geolocation) { setPill('pill-gps', 'err', 'NO GEOLOCATION'); return; }
  setPill('pill-gps', 'active', 'LOCATING');
  if (gpsWatchId === null) {
    gpsWatchId = navigator.geolocation.watchPosition(onGps, onGpsError, GPS_WATCH_OPTIONS);
  }
  if (gpsPollTimer === null) {
    pollGpsOnce();
    gpsPollTimer = setInterval(pollGpsOnce, GPS_POLL_MS);
  }
}

function pollGpsOnce() {
  if (!navigator.geolocation || gpsPollInFlight) return;
  gpsPollInFlight = true;
  navigator.geolocation.getCurrentPosition(
    function(pos) { gpsPollInFlight = false; onGps(pos); },
    function(err) { gpsPollInFlight = false; onGpsError(err); },
    { enableHighAccuracy: true, maximumAge: 0, timeout: GPS_TIMEOUT_MS }
  );
}

function onGps(pos) {
  const rawLat  = pos.coords.latitude;
  const rawLng  = pos.coords.longitude;
  const acc     = pos.coords.accuracy  || 999;
  const rawSpd  = pos.coords.speed     !== null ? pos.coords.speed : 0;
  const rawHdg  = pos.coords.heading;
  const now     = Date.now();

  // Stage 1 – Quality Assessment
  const quality = scoreGpsQuality(rawLat, rawLng, acc, rawSpd, rawHdg, now);

  // Stage 2 – Outlier Rejection
  const chk = checkOutlier(rawLat, rawLng, acc, now);
  let filtLat, filtLng, kgain = 0, innov = 0, kfSpd = 0;

  if (chk.rejected) {
    kfPredictOnly();  // adaptive noise, uses current KF speed internally
    filtLat = kfInitialized ? kfLat.x : rawLat;
    filtLng = kfInitialized ? kfLng.x : rawLng;
    kfSpd   = speedFromKf();
    rejectedCount++;
    dbg('GPS rejected – ' + chk.reason);
  } else {
    // GPS Acquisition: during the first 15s of navigation, prefer higher-quality fixes.
    // If a significantly better fix arrives far from the current KF position, re-anchor —
    // resetting the filter removes the incorrect initial position without user action.
    if (gpsAcquiring && navActive) {
      const elapsed = Date.now() - gpsAcquireStart;
      const conf    = quality.score;
      const better  = !bestAcquireFix ||
        conf > bestAcquireFix.confidence + 8 ||
        (acc < bestAcquireFix.acc * 0.6 && conf >= bestAcquireFix.confidence - 5);
      if (better) {
        if (kfInitialized) {
          const jumpM = haversine(kfLat.x, kfLng.x, rawLat, rawLng);
          if (jumpM > GPS_ACQUIRE_JUMP_M) {
            kfInitialized = false;
            kfUpdateCount = 0;
            currentRouteIdx = 0;
            dbg('GPS re-anchor: ' + Math.round(jumpM) + 'm, conf ' + Math.round(conf));
          }
        }
        bestAcquireFix = { lat: rawLat, lng: rawLng, acc: acc, confidence: conf };
      }
      if (conf >= GPS_ACQUIRE_CONF || elapsed >= GPS_ACQUIRE_MS) {
        gpsAcquiring = false;
        bestAcquireFix = null;
      }
    }

    // Stage 3 – Adaptive Kalman Filter Update
    // Pre-update speed drives noise selection; post-update speed used for display
    const preSpd = speedFromKf() || rawSpd;
    const kfr    = kfProcess(rawLat, rawLng, acc, quality.score, preSpd);
    filtLat = kfr.lat;
    filtLng = kfr.lng;
    kgain   = kfr.gain;
    innov   = kfr.innovation;
    kfSpd   = speedFromKf();
    recordSpeed(kfSpd || rawSpd);
    lastRawFix = { lat: rawLat, lng: rawLng, acc, speed: rawSpd, heading: rawHdg, time: now };
  }

  // Stage 4 – Adaptive Map Matching (display only)
  const snapped = mapMatchDisplay(filtLat, filtLng, quality.score, kfSpd);

  // Navigation position (routing, off-route, voice)
  navLat = filtLat;
  navLng = filtLng;
  userLat = filtLat;    // keep legacy alias in sync
  userLng = filtLng;
  lastAccuracy = acc;

  // Stage 5 – Predictive display target
  // During navigation above minimum speed, extrapolate KF_PREDICT_DT ahead using KF velocity.
  // This makes the marker appear to move continuously rather than jumping on each GPS fix.
  // The predicted position is still map-matched (display only). navLat/navLng are never predicted.
  const kfHdg = headingFromKf();
  const hdg   = (rawHdg !== null && !isNaN(rawHdg)) ? rawHdg : (kfHdg !== null ? kfHdg : dispHdg);

  if (navActive && kfInitialized && kfSpd > KF_MIN_SPEED_MS) {
    const predLat     = kfLat.x + kfLat.v * KF_PREDICT_DT;
    const predLng     = kfLng.x + kfLng.v * KF_PREDICT_DT;
    const predSnapped = mapMatchDisplay(predLat, predLng, quality.score, kfSpd);
    tgtLat = predSnapped.lat;
    tgtLng = predSnapped.lng;
  } else {
    tgtLat = snapped.lat;
    tgtLng = snapped.lng;
  }
  tgtHdg = hdg;

  // Seed display position on first fix so there is no initial jump
  if (dispLat === null) {
    dispLat = snapped.lat;
    dispLng = snapped.lng;
    dispHdg = hdg;
  }

  // Ensure correct marker type: dot outside navigation, arrow during navigation
  if (!gpsMarker || gpsMarkerIsArrow !== navActive) {
    if (gpsMarker) gpsMarker.remove();
    if (navActive) {
      gpsMarker = makeGpsArrow(dispLng, dispLat);
      gpsMarkerIsArrow = true;
    } else {
      gpsMarker = makeGpsDot(dispLng, dispLat);
      gpsMarkerIsArrow = false;
    }
  }
  startMarkerAnimation();

  // Accuracy circle uses filtered position
  if (accuracySourceReady) {
    map.getSource('accuracy').setData(
      acc > 30 ? circleFeature(filtLat, filtLng, acc) : { type: 'FeatureCollection', features: [] }
    );
  }

  // GPS pill
  const accRound = Math.round(acc);
  if (gpsAcquiring && navActive) {
    setPill('pill-gps', accRound < 80 ? 'ok' : 'warn', 'ACQUIRING +' + accRound + 'm');
  } else {
    setPill('pill-gps', accRound < 80 ? 'ok' : 'warn',
      filtLat.toFixed(4) + ',' + filtLng.toFixed(4) + ' +' + accRound + 'm');
  }

  if (!origin) setOrigin(filtLat, filtLng, 'Current GPS');

  if (pendingFlyToGps && !navActive) {
    pendingFlyToGps = false;
    $('origin-gps').classList.remove('active');
    if (!origin || origin.label === 'Current GPS') setOrigin(filtLat, filtLng, 'Current GPS');
    flyToGpsWithSplash(filtLat, filtLng);
  }

  // Stage 6 – Navigation update (uses filtered position, not display)
  if (navActive) onNavPosition(filtLat, filtLng, hdg, rawSpd);

  // Stage 7 – Diagnostic
  if (DIAG_MODE) updateDiag(quality, acc, rawSpd, hdg, kgain, innov, rawLat, rawLng);

  // Log every fix
  logGpsFix({
    ts: now, rawLat, rawLng, filtLat, filtLng,
    dispLat: dispLat, dispLng: dispLng,
    acc, speed: rawSpd, heading: hdg || 0,
    confidence: quality.score,
    rejected: chk.rejected, reason: chk.reason || null,
    kgain, innovation: innov
  });
}

function onGpsError(err) {
  $('origin-gps').classList.remove('active');
  setPill('pill-gps', err.code === err.PERMISSION_DENIED ? 'err' : 'warn', err.message || 'GPS ERROR');
  dbg('GPS error: ' + err.message);
}

function useGpsOrigin() {
  if (userLat === null) {
    pendingFlyToGps = true;
    $('origin-gps').classList.add('active');
    startGps();
    toast('Getting GPS...');
    return;
  }
  setOrigin(userLat, userLng, 'Current GPS');
  flyToGpsWithSplash(userLat, userLng);
}

/* ── Routing ───────────────────────────────────────── */
async function calculateRoute() {
  if (!origin || !dest) { toast('Set origin and destination first'); return; }
  const url = 'https://graphhopper.com/api/1/route?point=' + origin.lat + ',' + origin.lng +
    '&point=' + dest.lat + ',' + dest.lng +
    '&vehicle=car&locale=en&points_encoded=false&instructions=true&calc_points=true&key=' + GH_KEY;
  setPill('pill-camera', 'active', 'ROUTING');
  hideRoutePreview();
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('GraphHopper ' + r.status);
    currentRoute = await r.json();
    const path = currentRoute.paths[0];
    routeCoords = path.points.coordinates.map(function(c) { return [c[1], c[0]]; });
    routeTotalDistance = path.distance || polylineLength(routeCoords);
    routeTotalTimeSecs = path.time ? path.time / 1000 : 0;
    navSteps = extractSteps(path);
    navStep = 0;
    map.getSource('route').setData(lineFeature(routeCoords));
    map.getSource('traffic-route').setData({ type: 'FeatureCollection', features: [] });
    trafficColors = [];
    fitRoute(routeCoords);
    setPill('pill-camera', '', 'ROUTE READY');
    showRoutePreview();
  } catch (e) {
    setPill('pill-camera', 'err', 'ROUTE ERROR');
    toast('Route failed');
    dbg(e.message);
  }
}

function extractSteps(path) {
  return (path.instructions || []).map(function(inst, idx) {
    return {
      instruction: stripHtml(inst.text || 'Continue'),
      distance: inst.distance || 0,
      interval: inst.interval || [0, 0],
      sign: inst.sign || 0,
      distFromStart: inst.interval ? polylineLength(routeCoords.slice(0, inst.interval[0] + 1)) : 0,
      idx: idx
    };
  });
}

function stripHtml(s) {
  const div = document.createElement('div');
  div.innerHTML = s;
  return div.textContent || div.innerText || s;
}

function fitRoute(coords) {
  const bounds = new maplibregl.LngLatBounds();
  coords.forEach(function(c) { bounds.extend(toLngLat(c)); });
  map.fitBounds(bounds, { padding: 70, duration: 700 });
}

/* ── Navigation ────────────────────────────────────── */
function toggleNavigation() {
  if (navActive) stopNavigation();
  else if (currentRoute && routeCoords.length) showRoutePreview();
  else toast('Calculate a route first');
}

async function startNavigation() {
  if (!currentRoute || !routeCoords.length) { toast('Calculate a route first'); return; }
  startGps();
  navActive = true;
  following = true;
  navStep = 0;
  $('nav-hud').classList.add('active');
  $('panel').classList.add('nav-mode');
  $('nav-btn').textContent = 'Stop';
  $('nav-btn').classList.add('danger');
  $('recentre').classList.remove('visible');
  $('nav-stop-float').classList.add('visible');

  // Fade full route so only traffic-colored ahead portion dominates
  map.setPaintProperty('route-line',   'line-opacity', 0.18);
  map.setPaintProperty('route-casing', 'line-opacity', 0.18);
  // Reset all navigation state for new trip
  lastTrafficRouteUpdate = 0;
  offRouteCount = 0;
  lastOffRouteWarnTime = 0;
  isRerouting = false;
  kfInitialized = false; kfUpdateCount = 0; kfLat = null; kfLng = null;
  lastRawFix = null;
  speedSamples = []; etaSmoothed = 0; currentRouteIdx = 0;
  dispLat = null; dispLng = null; tgtLat = null; tgtLng = null; dispHdg = 0; tgtHdg = 0;
  rejectedCount = 0;
  gpsAcquiring    = true;
  gpsAcquireStart = Date.now();
  bestAcquireFix  = null;
  arrivalRadiusEnterTime = null;
  arrivalConfirmed = false;
  navZoomSmoothed = NAV_ZOOM;
  headingChangeRate = 0;
  displayedDistToManeuver = 0;
  if (map.getSource('route-highlight')) {
    map.getSource('route-highlight').setData(lineFeature([]));
    map.setPaintProperty('route-highlight', 'line-opacity', 0.97);
  }
  startDistInterpolation();
  if (DIAG_MODE) $('diag').classList.add('visible');

  // Remove existing GPS marker — onGps will recreate it as an arrow on next fix
  if (gpsMarker) { gpsMarker.remove(); gpsMarker = null; gpsMarkerIsArrow = false; }

  // Voice — called from button click, safe on iOS
  lastSpokenStep = -1;
  voiceThresholdsFired = {};
  speak('Navigation started. ' + (navSteps[0] ? navSteps[0].instruction : ''));
  startIosTtsKeepalive();

  // 3D is handled by NAV_PITCH; update button state
  setPill('pill-camera', 'active', 'HEADING-UP');
  startHeading();
  await acquireWakeLock();
  if (userLat !== null) {
    map.easeTo({ center: [userLng, userLat], zoom: NAV_ZOOM, pitch: is3D ? 55 : NAV_PITCH, bearing: headingSmoothed, duration: 700 });
  }
  updateHud(0, 0);
}

function stopNavigation() {
  navActive = false;
  $('nav-hud').classList.remove('active');
  $('panel').classList.remove('nav-mode');
  $('nav-btn').textContent = 'Navigate';
  $('nav-btn').classList.remove('danger');
  $('recentre').classList.remove('visible');
  $('nav-stop-float').classList.remove('visible');
  hideRoutePreview();

  if (window.speechSynthesis) window.speechSynthesis.cancel();
  stopIosTtsKeepalive();
  lastSpokenStep = -1;
  voiceThresholdsFired = {};

  // Restore full route appearance and clear traffic/highlight overlays
  map.setPaintProperty('route-line',   'line-opacity', 0.95);
  map.setPaintProperty('route-casing', 'line-opacity', 0.9);
  map.getSource('traffic-route').setData({ type: 'FeatureCollection', features: [] });
  if (map.getSource('route-highlight')) {
    map.getSource('route-highlight').setData(lineFeature([]));
    map.setPaintProperty('route-highlight', 'line-opacity', 0.0);
  }
  offRouteCount = 0;
  stopDistInterpolation();
  gpsAcquiring = false;
  bestAcquireFix = null;
  arrivalRadiusEnterTime = null;
  navZoomSmoothed = NAV_ZOOM;
  headingChangeRate = 0;

  // Stop filter animation loop and restore dot marker
  stopMarkerAnimation();
  isRerouting = false;
  offRouteCount = 0;
  if (gpsMarker) { gpsMarker.remove(); gpsMarker = null; }
  if (dispLat !== null) {
    gpsMarker = makeGpsDot(dispLng, dispLat);
    gpsMarkerIsArrow = false;
  }
  $('diag').classList.remove('visible');

  map.easeTo({ pitch: is3D ? 45 : 0, bearing: 0, duration: 700 });
  setPill('pill-camera', '', 'NORTH-UP');
  stopHeading();
  if (wakeLock) { wakeLock.release().catch(function(){}); wakeLock = null; }
}

function recentre() {
  if (userLat === null) return;
  following = true;
  $('recentre').classList.remove('visible');
  const center = navActive
    ? cameraLookAheadCenter(userLat, userLng, headingSmoothed, speedFromKf())
    : [userLng, userLat];
  map.easeTo({ center, zoom: NAV_ZOOM, pitch: is3D ? 55 : NAV_PITCH, bearing: headingSmoothed, duration: 500 });
}

function onNavPosition(lat, lng, heading, speed) {
  // Camera follows filtered nav position (not display-snapped position)
  const bearing = (heading !== null && !isNaN(heading))
    ? heading
    : gpsHeadingFromPositions(lat, lng);
  if (bearing !== null) smoothHeading(bearing);
  if (following) {
    const spd    = speedFromKf();
    const center = cameraLookAheadCenter(lat, lng, headingSmoothed, spd);
    // Zoom in slightly during turns for better corner visibility
    const zTarget   = headingChangeRate > 12 ? NAV_ZOOM + 0.5 : NAV_ZOOM;
    navZoomSmoothed = navZoomSmoothed * 0.93 + zTarget * 0.07;
    map.easeTo({
      center: center,
      zoom: navZoomSmoothed,
      pitch: is3D ? 55 : NAV_PITCH,
      bearing: headingSmoothed,
      duration: 650,
      easing: function(t) { return t; }
    });
  }
  syncNavigation(lat, lng);
}

/* ── Rerouting ─────────────────────────────────────── */
async function triggerReroute() {
  if (isRerouting || !navLat || !dest) return;
  isRerouting = true;
  offRouteCount = 0;
  speak('Rerouting');
  setPill('pill-camera', 'active', 'REROUTING');

  const url = 'https://graphhopper.com/api/1/route?point=' + navLat + ',' + navLng +
    '&point=' + dest.lat + ',' + dest.lng +
    '&vehicle=car&locale=en&points_encoded=false&instructions=true&calc_points=true&key=' + GH_KEY;

  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('GraphHopper ' + r.status);
    const data = await r.json();
    const path = data.paths && data.paths[0];
    if (!path || !path.points) throw new Error('No route');

    routeCoords           = path.points.coordinates.map(function(c) { return [c[1], c[0]]; });
    routeTotalDistance    = path.distance || polylineLength(routeCoords);
    routeTotalTimeSecs    = path.time ? path.time / 1000 : 0;
    navSteps              = extractSteps(path);
    navStep               = 0;   // will be recomputed on next syncNavigation
    currentRouteIdx       = 0;
    trafficColors         = [];
    lastTrafficRouteUpdate = 0;
    etaSmoothed           = 0;
    lastSpokenStep        = -1;  // causes next sync to announce step 1
    voiceThresholdsFired  = {};

    map.getSource('route').setData(lineFeature(routeCoords));
    map.getSource('traffic-route').setData({ type: 'FeatureCollection', features: [] });

    isRerouting = false;
    setPill('pill-camera', 'active', 'HEADING-UP');
  } catch (e) {
    isRerouting = false;
    toast('Rerouting failed — check connection');
    setPill('pill-camera', 'active', 'HEADING-UP');
    dbg('Reroute: ' + e.message);
  }
}

/* ── Route highlight (next 400m ahead in brighter blue) ────────── */
function routeHighlightCoords(fromIdx, distM) {
  if (!routeCoords.length || fromIdx >= routeCoords.length) return [];
  const coords = [routeCoords[fromIdx]];
  let accum = 0;
  for (let i = fromIdx + 1; i < routeCoords.length; i++) {
    const d = haversine(routeCoords[i-1][0], routeCoords[i-1][1], routeCoords[i][0], routeCoords[i][1]);
    if (accum + d >= distM) {
      const t = (distM - accum) / d;
      coords.push([
        routeCoords[i-1][0] + t * (routeCoords[i][0] - routeCoords[i-1][0]),
        routeCoords[i-1][1] + t * (routeCoords[i][1] - routeCoords[i-1][1])
      ]);
      break;
    }
    accum += d;
    coords.push(routeCoords[i]);
  }
  return coords;
}

/* ── Smooth maneuver distance interpolation ─────────────────────── */
function startDistInterpolation() {
  if (smoothDistTimer) return;
  smoothDistTimer = setInterval(function() {
    if (!navActive || displayedDistToManeuver <= 0) return;
    const now = Date.now();
    const dt  = (now - lastHudDistMs) / 1000;
    lastHudDistMs = now;
    const spd = speedFromKf();
    if (spd > 0.5) {
      displayedDistToManeuver = Math.max(0, displayedDistToManeuver - spd * dt);
      $('nav-distance').textContent = formatDist(displayedDistToManeuver);
    }
  }, 250);
}

function stopDistInterpolation() {
  if (smoothDistTimer) { clearInterval(smoothDistTimer); smoothDistTimer = null; }
}

/* ── Arrival detection ──────────────────────────────────────────── */
function checkArrival(lat, lng, remainDist, progress) {
  if (!dest || !navActive || arrivalConfirmed) return;
  const spd        = speedFromKf();
  const distToDest = haversine(lat, lng, dest.lat, dest.lng);
  const pct        = routeTotalDistance > 0 ? progress / routeTotalDistance : 0;
  const near       = distToDest < ARRIVAL_RADIUS_M || remainDist < ARRIVAL_DIST_M || pct > 0.98;
  if (near) {
    if (!arrivalRadiusEnterTime) arrivalRadiusEnterTime = Date.now();
    if (Date.now() - arrivalRadiusEnterTime > ARRIVAL_DWELL_S * 1000 && spd < 3) confirmArrival();
  } else {
    arrivalRadiusEnterTime = null;
  }
}

function confirmArrival() {
  if (arrivalConfirmed) return;
  arrivalConfirmed = true;
  const destName = (dest && dest.label) || (dest ? dest.lat.toFixed(5) + ', ' + dest.lng.toFixed(5) : 'Destination');
  addRecentSearch(destName, dest.lat, dest.lng);
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance('You have arrived at your destination');
  utt.lang = 'en-US'; utt.rate = 1.0; utt.volume = 1;
  let done = false;
  function finish() {
    if (done) return; done = true;
    stopNavigation();
    if (map.getSource('route'))           map.getSource('route').setData(lineFeature([]));
    if (map.getSource('route-highlight')) map.getSource('route-highlight').setData(lineFeature([]));
  }
  utt.onend = finish;
  setTimeout(finish, 5000);
  window.speechSynthesis.speak(utt);
}

/* ── Canonical navigation state update (single source of truth) ── */
function syncNavigation(lat, lng) {
  if (!routeCoords.length || !navSteps.length) return;
  if (isRerouting) return; // hold until async reroute resolves

  // ── 1. Position along route ────────────────────────
  const closest  = findClosestRoutePoint(lat, lng);
  const fromIdx  = closest.closestIdx;
  currentRouteIdx = fromIdx;
  const progress  = polylineLength(routeCoords.slice(0, fromIdx + 1));
  const remainDist = polylineLength(routeCoords.slice(fromIdx));

  // ── 2. Maneuver index — monotonically advancing ────
  // Find the last step whose trigger point has been passed (or is ≤10m ahead).
  // Using +10 avoids showing "0 m" in the HUD right before a turn.
  let completedIdx = -1;
  for (let i = 0; i < navSteps.length; i++) {
    if (navSteps[i].distFromStart <= progress + 10) completedIdx = i;
  }
  // displayStep = the NEXT upcoming maneuver (what to do NEXT, not what was just done)
  const rawDisplayStep = Math.min(completedIdx + 1, navSteps.length - 1);
  // Clamp: navStep can only advance, never go backward — prevents voice double-fire on GPS bounce
  navStep = Math.max(navStep, rawDisplayStep);
  const displayStep    = navStep;
  const distToManeuver = Math.max(0, navSteps[displayStep].distFromStart - progress);

  // ── 3. HUD and voice (read from canonical state) ───
  updateHud(displayStep, distToManeuver, remainDist);
  announceNavUpdate(displayStep, distToManeuver);
  checkArrival(lat, lng, remainDist, progress);

  // ── 4. Traffic-coloured ahead portion + highlight ──
  if (map.getSource('route-highlight')) {
    map.getSource('route-highlight').setData(lineFeature(routeHighlightCoords(fromIdx, 400)));
  }
  const remaining = routeCoords.slice(fromIdx);
  map.getSource('traffic-route').setData({
    type: 'FeatureCollection',
    features: buildColoredFeatures(remaining, fromIdx)
  });
  if (Date.now() - lastTrafficRouteUpdate > TRAFFIC_REFRESH_MS) {
    lastTrafficRouteUpdate = Date.now();
    fetchAndUpdateTrafficColors(fromIdx);
  }

  // ── 5. Off-route → reroute ─────────────────────────
  const threshold = lastAccuracy ? Math.max(50, lastAccuracy * 1.5) : 50;
  if (closest.distToRoute > threshold) {
    offRouteCount++;
    if (offRouteCount >= 5 && !isRerouting) {
      triggerReroute(); // async — sets isRerouting=true synchronously
    }
  } else {
    offRouteCount = 0;
  }
}

function updateHud(stepIdx, distToManeuver, remainDist) {
  const step = navSteps[stepIdx] || { instruction: 'Continue', sign: 0 };
  $('nav-instruction').textContent = step.instruction;
  displayedDistToManeuver = distToManeuver || 0;
  lastHudDistMs = Date.now();
  $('nav-distance').textContent = formatDist(displayedDistToManeuver);
  $('nav-arrow').textContent = arrowForSign(step.sign);
  const left = remainDist !== undefined ? remainDist : routeTotalDistance;
  $('meta-dist').textContent = formatDist(left);
  $('meta-step').textContent = navSteps.length ? (stepIdx + 1) + '/' + navSteps.length : '--';
  const etaSecs = computeEta(left, currentRouteIdx);
  $('meta-eta').textContent = etaSecs > 0
    ? new Date(Date.now() + etaSecs * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    : '--:--';
}

function arrowForSign(sign) {
  if (sign === -2 || sign === -3) return '↰';
  if (sign === 2  || sign === 3)  return '↱';
  if (sign === 4) return '↻';
  if (sign === 5) return '↺';
  if (sign === 6) return '↩';
  return '↑';
}

/* ── Compass / Heading ─────────────────────────────── */
function startHeading() {
  if (!window.DeviceOrientationEvent) return;
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(function(state) {
      if (state === 'granted') {
        window.addEventListener('deviceorientationabsolute', onOrientation, true);
        window.addEventListener('deviceorientation', onOrientation, true);
      }
    }).catch(function(){});
  } else {
    window.addEventListener('deviceorientationabsolute', onOrientation, true);
    window.addEventListener('deviceorientation', onOrientation, true);
  }
}

function stopHeading() {
  window.removeEventListener('deviceorientationabsolute', onOrientation, true);
  window.removeEventListener('deviceorientation', onOrientation, true);
  compassAvailable = false;
  headingHistory = [];
  lastGpsLat = null;
  lastGpsLng = null;
}

function onOrientation(e) {
  let heading = null;
  if (e.absolute && e.alpha !== null) heading = 360 - e.alpha;
  else if (e.webkitCompassHeading !== undefined) heading = e.webkitCompassHeading;
  if (heading !== null && !isNaN(heading)) { compassAvailable = true; smoothHeading(heading); }
}

function gpsHeadingFromPositions(lat, lng) {
  if (lastGpsLat === null) { lastGpsLat = lat; lastGpsLng = lng; return null; }
  if (haversine(lastGpsLat, lastGpsLng, lat, lng) < 6) return null;
  const dLng = (lng - lastGpsLng) * Math.PI / 180;
  const lat1 = lastGpsLat * Math.PI / 180;
  const lat2 = lat * Math.PI / 180;
  const y = Math.sin(dLng) * Math.cos(lat2);
  const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
  lastGpsLat = lat; lastGpsLng = lng;
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function smoothHeading(heading) {
  headingHistory.push(heading);
  if (headingHistory.length > 6) headingHistory.shift();
  let sin = 0, cos = 0;
  headingHistory.forEach(function(h) {
    sin += Math.sin(h * Math.PI / 180);
    cos += Math.cos(h * Math.PI / 180);
  });
  const newSmoothed = (Math.atan2(sin, cos) * 180 / Math.PI + 360) % 360;

  let dh = newSmoothed - headingSmoothed;
  if (dh >  180) dh -= 360;
  if (dh < -180) dh += 360;

  // Track heading change rate for turn detection
  const now = Date.now();
  if (lastHeadingMs > 0) {
    const dt = Math.max(0.05, (now - lastHeadingMs) / 1000);
    headingChangeRate = headingChangeRate * 0.72 + (Math.abs(dh) / dt) * 0.28;
  }
  lastHeadingMs = now;

  // Hysteresis: skip micro-jitter below 2°
  if (Math.abs(dh) > 2 || headingHistory.length <= 2) headingSmoothed = newSmoothed;
  if (navActive) setPill('pill-camera', 'active', Math.round(headingSmoothed) + '°');
}

/* ── Geometry helpers ──────────────────────────────── */
function pointToSegmentDist(lat, lng, p0, p1) {
  // Flat-earth projection — accurate enough for segments < ~20 km
  const cosLat = Math.cos(lat * Math.PI / 180);
  const x  = (lng  - p0[1]) * cosLat * 111320;
  const y  = (lat  - p0[0]) * 111320;
  const dx = (p1[1] - p0[1]) * cosLat * 111320;
  const dy = (p1[0] - p0[0]) * 111320;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.sqrt(x * x + y * y);
  const t  = Math.max(0, Math.min(1, (x * dx + y * dy) / lenSq));
  return Math.sqrt((x - t * dx) ** 2 + (y - t * dy) ** 2);
}

/* ── Traffic route coloring ────────────────────────── */
function ratioToTrafficColor(ratio) {
  if (ratio > 0.75) return '#3e82e0'; // free  — slightly darker blue (highlight zone is brighter)
  if (ratio > 0.45) return '#f1c40f'; // slow  — yellow
  return '#e74c3c';                   // jam   — red
}

async function fetchFlowForPoint(lat, lng) {
  try {
    const url = 'https://api.tomtom.com/traffic/services/4/flowSegmentData/absolute/10/json' +
      '?key=' + TT_KEY + '&point=' + lat + ',' + lng + '&unit=KMPH';
    const ctrl = new AbortController();
    const tid = setTimeout(function() { ctrl.abort(); }, 6000);
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(tid);
    if (!r.ok) return 1;
    const data = await r.json();
    const seg = data.flowSegmentData;
    if (!seg || !seg.freeFlowSpeed || seg.freeFlowSpeed === 0) return 1;
    return Math.min(1, Math.max(0, seg.currentSpeed / seg.freeFlowSpeed));
  } catch(e) { return 1; }
}

async function fetchAndUpdateTrafficColors(fromIdx) {
  if (!routeCoords.length) return;
  const segment = routeCoords.slice(fromIdx);
  if (segment.length < 2) return;

  // Up to 8 evenly-spaced sample points along the remaining route
  const totalLen = polylineLength(segment);
  const interval = Math.max(400, totalLen / 8);
  const samples = [{ coord: segment[0], routeIdx: fromIdx }];
  let accumulated = 0;
  for (let i = 1; i < segment.length; i++) {
    accumulated += haversine(segment[i-1][0], segment[i-1][1], segment[i][0], segment[i][1]);
    if (accumulated >= interval) {
      samples.push({ coord: segment[i], routeIdx: fromIdx + i });
      accumulated = 0;
    }
  }

  const results = await Promise.all(samples.map(async function(s) {
    const ratio = await fetchFlowForPoint(s.coord[0], s.coord[1]);
    return { routeIdx: s.routeIdx, ratio: ratio };
  }));

  // Paint each route coord with the color of its nearest sample
  for (let i = fromIdx; i < routeCoords.length; i++) {
    let bestRatio = 1, bestDist = Infinity;
    for (let j = 0; j < results.length; j++) {
      const d = haversine(routeCoords[i][0], routeCoords[i][1],
                          routeCoords[results[j].routeIdx][0], routeCoords[results[j].routeIdx][1]);
      if (d < bestDist) { bestDist = d; bestRatio = results[j].ratio; }
    }
    trafficColors[i] = ratioToTrafficColor(bestRatio);
  }

  // Redraw ahead portion if navigating
  if (navActive && userLat !== null) {
    const cl = findClosestRoutePoint(userLat, userLng);
    const rem = routeCoords.slice(cl.closestIdx);
    map.getSource('traffic-route').setData({
      type: 'FeatureCollection',
      features: buildColoredFeatures(rem, cl.closestIdx)
    });
  }
}

function buildColoredFeatures(remaining, startIdx) {
  if (remaining.length < 2) return [];
  const features = [];
  let currentColor = trafficColors[startIdx] || '#4f8ef7';
  let seg = [remaining[0]];
  for (let i = 1; i < remaining.length; i++) {
    const color = trafficColors[startIdx + i] || '#4f8ef7';
    if (color === currentColor) {
      seg.push(remaining[i]);
    } else {
      if (seg.length >= 2) features.push(coloredLineFeature(seg, currentColor));
      currentColor = color;
      seg = [remaining[i - 1], remaining[i]]; // 1-coord overlap closes gaps
    }
  }
  if (seg.length >= 2) features.push(coloredLineFeature(seg, currentColor));
  return features;
}

function coloredLineFeature(latLngs, color) {
  return {
    type: 'Feature',
    properties: { color: color },
    geometry: { type: 'LineString', coordinates: latLngs.map(toLngLat) }
  };
}

/* ── Traffic ───────────────────────────────────────── */
async function refreshTraffic() {
  if (!map.getLayer('tomtom-flow')) return;
  map.setPaintProperty('tomtom-flow', 'raster-opacity', 0.72);
  setPill('pill-traffic', 'active', 'FETCHING');
  const lat = userLat || 13.0827;
  const lng = userLng || 80.2707;
  const delta = 0.035;
  try {
    const url = 'https://api.tomtom.com/traffic/services/5/incidentDetails' +
      '?key=' + TT_KEY +
      '&bbox=' + (lng - delta) + ',' + (lat - delta) + ',' + (lng + delta) + ',' + (lat + delta) +
      '&fields={incidents{type,geometry{type,coordinates},properties{iconCategory,magnitudeOfDelay,events{description,code},from,to,roadNumbers,delay}}}&language=en-US&timeValidityFilter=present';
    const r = await fetch(url);
    const data = await r.json();
    renderIncidents((data.incidents || []).slice(0, 20));
    setPill('pill-traffic', 'ok', 'LIVE ' + (data.incidents || []).length);
  } catch (e) {
    setPill('pill-traffic', 'err', 'ERROR');
    dbg('Traffic error: ' + e.message);
  }
}

function renderIncidents(incidents) {
  incidentMarkers.forEach(function(m) { m.remove(); });
  incidentMarkers = [];
  incidents.forEach(function(inc) {
    const coords = inc.geometry && inc.geometry.coordinates;
    if (!coords) return;
    let lng, lat;
    if (inc.geometry.type === 'Point') { lng = coords[0]; lat = coords[1]; }
    else if (Array.isArray(coords[0])) { lng = coords[0][0]; lat = coords[0][1]; }
    if (!lat || !lng) return;
    const marker = makeHtmlMarker(
      '<div class="incident-marker">' + incidentIcon(inc.properties && inc.properties.iconCategory) + '</div>',
      lng, lat
    );
    const desc = inc.properties && inc.properties.events && inc.properties.events[0]
      ? inc.properties.events[0].description : 'Traffic incident';
    marker.setPopup(new maplibregl.Popup({ offset: 20 }).setHTML('<b>' + desc + '</b>'));
    incidentMarkers.push(marker);
  });
}

function incidentIcon(type) {
  const n = String(type || '').toLowerCase();
  if (n.includes('accident')) return '!';
  if (n.includes('road'))     return 'x';
  if (n.includes('jam'))      return '~';
  return '!';
}

/* ── Helpers ───────────────────────────────────────── */
async function acquireWakeLock() {
  try {
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
  } catch (e) { dbg('Wake lock failed: ' + e.message); }
}

document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible' && navActive) { acquireWakeLock(); pollGpsOnce(); }
});

function findClosestRoutePoint(lat, lng) {
  let bestIdx = 0, bestDist = Infinity;
  // Project onto each segment rather than just measuring to vertices
  for (let i = 0; i < routeCoords.length - 1; i++) {
    const d = pointToSegmentDist(lat, lng, routeCoords[i], routeCoords[i + 1]);
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  }
  // Check final vertex
  if (routeCoords.length > 1) {
    const dLast = haversine(lat, lng,
      routeCoords[routeCoords.length - 1][0], routeCoords[routeCoords.length - 1][1]);
    if (dLast < bestDist) { bestDist = dLast; bestIdx = routeCoords.length - 1; }
  }
  return { closestIdx: bestIdx, distToRoute: bestDist };
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000, toRad = Math.PI / 180;
  const dLat = (lat2 - lat1) * toRad, dLon = (lon2 - lon1) * toRad;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toRad)*Math.cos(lat2*toRad)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function polylineLength(coords) {
  let total = 0;
  for (let i = 1; i < coords.length; i++)
    total += haversine(coords[i-1][0], coords[i-1][1], coords[i][0], coords[i][1]);
  return total;
}

function formatDist(m) {
  if (!isFinite(m)) return '--';
  if (m < 1000) return Math.round(m) + ' m';
  return (m / 1000).toFixed(m < 10000 ? 1 : 0) + ' km';
}

window.addEventListener('load', initMap);
</script>
