<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0f14">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>PrivNav</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface-2: #1d2230;
    --border: #2b3140;
    --text: #e6e9f2;
    --muted: #8891a5;
    --accent: #4f8ef7;
    --free: #2ecc71;
    --slow: #f1c40f;
    --jam: #e74c3c;
    --font: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "SFMono-Regular", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }

  /* ── Splash ──────────────────────────────────────── */
  #splash {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: opacity 0.45s ease;
  }
  #splash.fade-out { opacity: 0; pointer-events: none; }
  #splash-icon { margin-bottom: 14px; }
  #splash-title {
    font-size: 46px;
    font-weight: 900;
    letter-spacing: -2px;
    color: var(--text);
  }
  #splash-sub {
    margin-top: 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    min-height: 16px;
  }
  #splash-ring {
    width: 60px;
    height: 60px;
    border: 3px solid rgba(79,142,247,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 18px;
    display: none;
  }
  #splash.loading #splash-ring { display: block; animation: spin 1s linear infinite; }
  #splash.loading #splash-icon { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── App shell ───────────────────────────────────── */
  #app { height: 100%; display: flex; flex-direction: column; }
  #topbar {
    height: 54px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: rgba(13,15,20,0.96);
    border-bottom: 1px solid var(--border);
    z-index: 5;
    overflow: hidden;
  }
  #brand { font-weight: 900; letter-spacing: -0.5px; white-space: nowrap; font-size: 15px; }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 28px;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    white-space: nowrap;
  }
  .pill.ok  { color: var(--free); border-color: rgba(46,204,113,0.5); }
  .pill.warn { color: var(--slow); border-color: rgba(241,196,15,0.5); }
  .pill.err  { color: var(--jam);  border-color: rgba(231,76,60,0.5); }
  .pill.active { color: var(--accent); border-color: rgba(79,142,247,0.5); }
  #pill-voice { cursor: pointer; user-select: none; }

  /* ── Map area ────────────────────────────────────── */
  #map-wrap { flex: 1; position: relative; min-height: 0; }
  #map { position: absolute; inset: 0; }

  /* ── Panel ───────────────────────────────────────── */
  #panel {
    position: absolute;
    top: 12px;
    right: 12px;
    width: min(360px, calc(100vw - 24px));
    max-height: calc(100% - 24px);
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px;
    background: rgba(21,24,32,0.95);
    border: 1px solid var(--border);
    border-radius: 8px;
    z-index: 3;
    overflow: auto;
    box-shadow: 0 12px 32px rgba(0,0,0,0.38);
  }
  #panel-min-row {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  #panel-min-label { font-size: 10px; font-family: var(--mono); color: var(--muted); display: none; margin-right: auto; }
  #panel.minimized #panel-min-label { display: block; }
  #panel.minimized #panel-body { display: none; }
  #panel.minimized { gap: 0; padding: 6px 8px; }

  .row   { display: flex; gap: 8px; align-items: center; }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  label  { font-size: 10px; color: var(--muted); font-family: var(--mono); }

  input {
    width: 100%;
    min-height: 38px;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #0f1219;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  button {
    min-height: 38px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface-2);
    color: var(--text);
    font-weight: 700;
    cursor: pointer;
  }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.danger  { background: var(--jam);    border-color: var(--jam);    color: #fff; }
  button.icon    { width: 42px; flex: 0 0 42px; font-size: 18px; display: flex; align-items: center; justify-content: center; }

  /* GPS origin button */
  #origin-gps { color: var(--muted); transition: color 0.2s, border-color 0.2s; }
  #origin-gps.active { color: var(--accent); border-color: rgba(79,142,247,0.6); animation: gps-pulse 1s ease-in-out infinite; }
  @keyframes gps-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }

  /* 3D button (inside panel header) */
  #btn-3d {
    font-size: 10px;
    font-family: var(--mono);
    font-weight: 700;
    padding: 4px 9px;
    min-height: unset;
    height: 28px;
    border-radius: 5px;
    color: var(--muted);
    white-space: nowrap;
  }
  #btn-3d.active { color: var(--accent); border-color: rgba(79,142,247,0.5); }

  .results {
    display: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    background: #10141c;
  }
  .result { padding: 8px 10px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .result:last-child { border-bottom: 0; }
  .result-name { font-size: 13px; font-weight: 700; }
  .result-addr { margin-top: 2px; font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-badge { opacity: 0.45; margin-right: 4px; font-size: 0.85em; }

  /* ── Nav HUD ─────────────────────────────────────── */
  #nav-hud {
    display: none;
    position: absolute;
    top: 12px;
    left: 12px;
    width: min(420px, calc(100vw - 24px));
    z-index: 4;
    pointer-events: none;
  }
  #nav-hud.active { display: block; }
  .hud-card {
    background: rgba(21,24,32,0.96);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.38);
    overflow: hidden;
  }
  #maneuver { display: flex; gap: 12px; align-items: center; padding: 14px; background: var(--accent); }
  #nav-arrow    { font-size: 42px; line-height: 1; }
  #nav-instruction { font-size: 16px; font-weight: 800; line-height: 1.25; }
  #nav-distance    { margin-top: 2px; font-family: var(--mono); font-size: 14px; opacity: 0.9; }
  #nav-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); }
  .meta { padding: 8px; background: var(--surface); text-align: center; }
  .meta strong { display: block; font-family: var(--mono); font-size: 14px; }
  .meta span   { display: block; margin-top: 2px; color: var(--muted); font-size: 9px; font-family: var(--mono); }

  /* ── Recentre button ─────────────────────────────── */
  #recentre {
    position: absolute;
    right: 14px;
    bottom: 88px;
    z-index: 4;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    background: rgba(21,24,32,0.96);
    color: var(--accent);
    border-color: var(--accent);
  }
  #recentre.visible { display: flex; }

  /* ── Markers ─────────────────────────────────────── */
  .gps-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid #fff;
    box-shadow: 0 0 0 4px rgba(79,142,247,0.35);
  }
  .gps-arrow-wrap {
    filter: drop-shadow(0 2px 5px rgba(0,0,0,0.45));
    line-height: 0;
  }
  .pin {
    width: 22px; height: 22px;
    border-radius: 50% 50% 50% 4px;
    transform: rotate(-45deg);
    border: 2px solid #fff;
    display: grid;
    place-items: center;
    font-size: 10px;
    font-weight: 800;
  }
  .pin span { transform: rotate(45deg); }
  .incident-marker { font-size: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

  /* ── Route preview sheet ─────────────────────────── */
  #route-preview {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    z-index: 8;
    background: rgba(17,20,28,0.98);
    border-top: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    padding: 18px 16px 32px;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
  }
  #route-preview.visible { transform: translateY(0); pointer-events: auto; }
  #rp-handle {
    width: 38px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 14px;
  }
  #rp-header {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: 0.08em;
  }
  #rp-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  #rp-stats .meta { background: var(--surface); }
  #rp-stats .meta strong { font-size: 18px; }
  #rp-stats .meta span  { font-size: 9px; }

  /* ── Float stop button ───────────────────────────── */
  #nav-stop-float {
    display: none;
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    min-height: unset;
    padding: 13px 36px;
    background: var(--jam);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    font-weight: 800;
    box-shadow: 0 4px 20px rgba(231,76,60,0.45);
    white-space: nowrap;
  }
  #nav-stop-float.visible { display: block; }
  @media (min-width: 721px) { #nav-stop-float { display: none !important; } }

  /* ── Toast / Debug ───────────────────────────────── */
  #toast {
    position: absolute;
    left: 50%; bottom: 18px;
    transform: translateX(-50%);
    z-index: 5;
    display: none;
    max-width: calc(100vw - 24px);
    padding: 9px 12px;
    background: rgba(21,24,32,0.98);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 12px;
    box-shadow: 0 10px 26px rgba(0,0,0,0.4);
  }
  #debug {
    display: none;
    position: absolute;
    left: 12px; bottom: 12px;
    z-index: 3;
    max-width: min(420px, calc(100vw - 24px));
    max-height: 160px;
    overflow: auto;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: rgba(15,18,25,0.92);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
  }

  /* ── Diagnostic overlay ─────────────────────────── */
  #diag {
    display: none;
    position: absolute;
    left: 12px;
    bottom: 12px;
    z-index: 7;
    min-width: 200px;
    padding: 8px 10px;
    background: rgba(0,0,0,0.82);
    border: 1px solid #333;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 10px;
    line-height: 1.7;
    color: #0f0;
    pointer-events: none;
  }
  #diag.visible { display: block; }
  #diag-row { display: flex; justify-content: space-between; gap: 12px; }
  .dk { color: #888; }

  /* ── Mobile ──────────────────────────────────────── */
  @media (max-width: 720px) {
    #topbar { gap: 6px; }
    #brand  { font-size: 13px; }
    .pill   { font-size: 10px; padding-inline: 6px; }
    #panel  { top: auto; right: 8px; left: 8px; bottom: 8px; width: auto; max-height: 44%; }
    #panel.nav-mode { display: none; }
    #route-preview { border-radius: 14px 14px 0 0; }
  }
</style>
</head>
<body>

<!-- ── Splash screen ──────────────────────────────── -->
<div id="splash" class="loading">
  <div id="splash-ring"></div>
  <div id="splash-icon">
    <svg viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12,2 19,21 12,17 5,21"/>
    </svg>
  </div>
  <div id="splash-title">PrivNav</div>
  <div id="splash-sub">Loading map...</div>
</div>

<div id="app">
  <div id="topbar">
    <div id="brand">PrivNav</div>
    <div id="pill-gps" class="pill">NO GPS</div>
    <div id="pill-traffic" class="pill">TRAFFIC IDLE</div>
    <div id="pill-camera" class="pill">NORTH-UP</div>
    <div id="pill-voice" class="pill ok" title="Toggle voice">VOICE</div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>

    <!-- Nav HUD -->
    <div id="nav-hud">
      <div class="hud-card">
        <div id="maneuver">
          <div id="nav-arrow">↑</div>
          <div>
            <div id="nav-instruction">Starting navigation</div>
            <div id="nav-distance">--</div>
          </div>
        </div>
        <div id="nav-meta">
          <div class="meta"><strong id="meta-eta">--:--</strong><span>ETA</span></div>
          <div class="meta"><strong id="meta-dist">--</strong><span>LEFT</span></div>
          <div class="meta"><strong id="meta-step">--</strong><span>STEP</span></div>
        </div>
      </div>
    </div>

    <button id="recentre" title="Recenter">◎</button>

    <!-- Float stop button (mobile only) -->
    <button id="nav-stop-float">End Navigation</button>

    <!-- Route preview sheet -->
    <div id="route-preview">
      <div id="rp-handle"></div>
      <div id="rp-header">ROUTE PREVIEW</div>
      <div id="rp-stats">
        <div class="meta"><strong id="rp-dist">--</strong><span>DISTANCE</span></div>
        <div class="meta"><strong id="rp-time">--</strong><span>DURATION</span></div>
        <div class="meta"><strong id="rp-eta">--:--</strong><span>ETA</span></div>
      </div>
      <div class="row">
        <button id="rp-cancel" style="flex:1">Cancel</button>
        <button id="rp-start" class="primary" style="flex:2">Start Navigation</button>
      </div>
    </div>

    <!-- Side panel -->
    <div id="panel">
      <div id="panel-min-row">
        <span id="panel-min-label">MENU</span>
        <button id="btn-3d" title="Toggle 3D buildings">3D Buildings</button>
        <button class="icon" id="panel-toggle" title="Minimize panel">−</button>
      </div>
      <div id="panel-body">
        <div class="stack">
          <label>Origin</label>
          <div class="row">
            <input id="origin-input" placeholder="Search or use GPS" autocomplete="off">
            <button class="icon" id="origin-gps" title="Get GPS location">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                <circle cx="12" cy="12" r="4"/>
                <line x1="12" y1="2" x2="12" y2="7"/>
                <line x1="12" y1="17" x2="12" y2="22"/>
                <line x1="2"  y1="12" x2="7"  y2="12"/>
                <line x1="17" y1="12" x2="22" y2="12"/>
              </svg>
            </button>
          </div>
          <div id="origin-results" class="results"></div>
        </div>
        <div class="stack">
          <label>Where to?</label>
          <input id="dest-input" placeholder="Search destination" autocomplete="off">
          <div id="dest-results" class="results"></div>
        </div>
        <div class="row">
          <button id="route-btn" class="primary" style="flex:1">Route</button>
          <button id="nav-btn"   class="primary" style="flex:1">Navigate</button>
        </div>
        <!-- Hidden — kept so existing JS references don't throw -->
        <button id="traffic-btn" style="display:none">Refresh Traffic</button>
        <button id="debug-btn"   style="display:none">Debug</button>
      </div>
    </div>

    <!-- Diagnostic overlay — visible only when DIAG_MODE = true -->
    <div id="diag">
      <div id="diag-row"><span class="dk">QUALITY</span><span id="dv-score">--</span></div>
      <div id="diag-row"><span class="dk">ACCURACY</span><span id="dv-acc">--</span></div>
      <div id="diag-row"><span class="dk">SPEED</span><span id="dv-spd">--</span></div>
      <div id="diag-row"><span class="dk">HEADING</span><span id="dv-hdg">--</span></div>
      <div id="diag-row"><span class="dk">KF GAIN</span><span id="dv-gain">--</span></div>
      <div id="diag-row"><span class="dk">REJECTED</span><span id="dv-rej">0</span></div>
      <div id="diag-row"><span class="dk">RAW→FILT</span><span id="dv-drift">--</span></div>
      <div id="diag-row"><span class="dk">LERP</span><span id="dv-lerp">--</span></div>
      <div id="diag-row"><span class="dk">INNOV</span><span id="dv-innov">--</span></div>
    </div>
    <div id="toast"></div>
    <div id="debug"></div>
  </div>
</div>

<script>
const GH_KEY = '10eb47ca-323f-45aa-a666-c55978a75e6a';
const TT_KEY = 'z0q4MOEZiJYluDAhrU2tyW88EuR2Soz0';
const CHENNAI_CENTER = [80.2707, 13.0827];
const NAV_ZOOM = 17;
const NAV_PITCH = 48;
const OFF_ROUTE_THRESHOLD = 65;
const GPS_WATCH_OPTIONS = { enableHighAccuracy: true, maximumAge: 1000, timeout: 20000 };
const GPS_POLL_MS = 3000;
const GPS_TIMEOUT_MS = 12000;
const TRAFFIC_REFRESH_MS = 3 * 60 * 1000;

// ── Navigation Filter Tuning ─────────────────────────────────────────────────
// All values exposed here so they can be adjusted between test drives.
const KF_PROCESS_NOISE_POS   = 2e-9;   // position variance added per update (deg²)
const KF_PROCESS_NOISE_VEL   = 2e-10;  // velocity variance added per update (deg²/s²)
const KF_MEAS_NOISE_BASE     = 3e-8;   // floor measurement noise (deg²), ~20 m at 111 320 m/deg
const KF_CONF_WEIGHT_SCALE   = 2.0;    // exponent scale: how strongly confidence penalises R
const KF_MAX_INNOVATION_M    = 180;    // innovation > this (m) → outlier reject (needs ≥3 fixes first)
const OUTLIER_MAX_SPEED_MS   = 55;     // reject if implied speed > this m/s (≈ 200 km/h)
const OUTLIER_MAX_JUMP_M     = 400;    // reject if position jump > this (m)
const OUTLIER_MIN_ACCURACY   = 200;    // reject if GPS accuracy worse than this (m)
const ETA_SPEED_WINDOW_MS    = 25000;  // rolling speed average window (ms)
const ETA_BLEND_ALPHA        = 0.30;   // weight of current-speed ETA vs GraphHopper baseline
const ETA_SMOOTH_ALPHA       = 0.08;   // ETA update smoothing factor
const ETA_MIN_MOVE_MS        = 1.0;    // ignore speed samples below this (m/s) for ETA — filters stops
const GPS_LOG_SIZE           = 300;    // rolling in-memory GPS log entries
const DIAG_MODE              = false;  // set true to show diagnostic overlay while driving

// ── Predictive motion & camera look-ahead ────────────────────────────────────
const KF_PREDICT_DT      = 0.75;  // seconds to extrapolate ahead for display marker
const KF_MIN_SPEED_MS    = 0.8;   // below this (m/s) prediction is disabled (avoids jitter at stops)
const LOOKAHEAD_BASE_M   = 60;    // camera offset ahead of vehicle at zero speed (m)
const LOOKAHEAD_SCALE    = 2.5;   // additional m of look-ahead per m/s of vehicle speed
const LOOKAHEAD_MAX_M    = 220;   // maximum camera offset (m ≈ achieved at ~64 m/s)

// ── Arrival detection ────────────────────────────────────────────────────────
const ARRIVAL_DIST_M   = 50;  // remaining route (m) below which arrival is possible
const ARRIVAL_RADIUS_M = 35;  // GPS distance-to-destination that starts the dwell timer
const ARRIVAL_DWELL_S  = 5;   // seconds at low speed inside radius to confirm arrival

// ── GPS acquisition (first fix quality) ─────────────────────────────────────
const GPS_ACQUIRE_MS     = 15000;  // window to wait for a high-quality initial fix
const GPS_ACQUIRE_CONF   = 70;     // confidence score that exits acquisition early
const GPS_ACQUIRE_JUMP_M = 100;    // minimum displacement (m) to trigger a KF re-anchor

// ── Search Manager ───────────────────────────────────────────────────────────
const SEARCH_DEBOUNCE_MS = 300;
const SEARCH_MIN_CHARS   = 3;
const SEARCH_CACHE_SIZE  = 50;

let map;
let gpsMarker = null;
let accuracySourceReady = false;
let originMarker = null;
let destMarker = null;
let incidentMarkers = [];
let origin = null;
let dest = null;
let currentRoute = null;
let routeCoords = [];
let navSteps = [];
let navStep = 0;
let navActive = false;
let following = true;
let userLat = null;
let userLng = null;
let lastAccuracy = null;
let gpsWatchId = null;
let gpsPollTimer = null;
let gpsPollInFlight = false;
let headingSmoothed = 0;
let headingHistory = [];
let compassAvailable = false;
let lastGpsLat = null;
let lastGpsLng = null;

/* ── Voice / TTS ───────────────────────────────────── */
function speak(text) {
  if (voiceMuted || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 1.0;
  utt.volume = 1;
  window.speechSynthesis.speak(utt);
}

function startIosTtsKeepalive() {
  iosTtsTimer = setInterval(function() {
    if (window.speechSynthesis && window.speechSynthesis.paused) window.speechSynthesis.resume();
  }, 5000);
}

function stopIosTtsKeepalive() {
  clearInterval(iosTtsTimer);
  iosTtsTimer = null;
}

// displayStep = the upcoming maneuver the user is approaching
// distToManeuver = metres to that maneuver's trigger point
function announceNavUpdate(displayStep, distToManeuver) {
  if (isRerouting || arrivalConfirmed || !navSteps.length) return;
  const step = navSteps[displayStep];
  if (!step) return;

  // Step changed → announce new instruction immediately (once per step)
  if (displayStep !== lastSpokenStep) {
    lastSpokenStep = displayStep;
    voiceThresholdsFired = {};
    const isArrival = displayStep === navSteps.length - 1;
    speak(isArrival ? 'You have arrived at your destination' : step.instruction);
    return;
  }

  // Advance distance warnings for the CURRENT upcoming maneuver
  [500, 200].forEach(function(threshold) {
    if (distToManeuver > 0 && distToManeuver <= threshold && !voiceThresholdsFired[threshold]) {
      voiceThresholdsFired[threshold] = true;
      // Use actual distance in speech, rounded to nearest 50m
      const d = Math.round(distToManeuver / 50) * 50;
      const distStr = d >= 1000 ? (d / 1000).toFixed(1) + ' kilometres' : d + ' metres';
      speak('In ' + distStr + ', ' + step.instruction);
    }
  });
}

/* ═══════════════════════════════════════════════════
   NAVIGATION FILTER ENGINE
   Each stage is isolated; tune via constants at top.
   ═══════════════════════════════════════════════════ */

/* ── 1. Kalman filter (two independent 1-D filters) ─ */
function kf1dPredict(s, dt, qPos, qVel) {
  // Optional Q params allow adaptive process noise without touching constants
  qPos = (qPos !== undefined) ? qPos : KF_PROCESS_NOISE_POS;
  qVel = (qVel !== undefined) ? qVel : KF_PROCESS_NOISE_VEL;
  const x   = s.x + s.v * dt;
  const v   = s.v;
  const p00 = s.p[0][0] + dt * (s.p[0][1] + s.p[1][0]) + dt * dt * s.p[1][1] + qPos;
  const p01 = s.p[0][1] + dt * s.p[1][1];
  const p10 = s.p[1][0] + dt * s.p[1][1];
  const p11 = s.p[1][1] + qVel;
  return { x, v, p: [[p00, p01], [p10, p11]] };
}

function kf1dUpdate(s, meas, R) {
  // H=[1,0]:  S = p00 + R,  K=[p00/S, p10/S],  y=meas-x
  const S  = s.p[0][0] + R;
  const K0 = s.p[0][0] / S;
  const K1 = s.p[1][0] / S;
  const y  = meas - s.x;
  const x  = s.x + K0 * y;
  const v  = s.v + K1 * y;
  // P = (I - K*H)*P
  const p00 = (1 - K0) * s.p[0][0];
  const p01 = (1 - K0) * s.p[0][1];
  const p10 = s.p[1][0] - K1 * s.p[0][0];
  const p11 = s.p[1][1] - K1 * s.p[0][1];
  return { x, v, p: [[p00, p01], [p10, p11]], K: K0, innovation: y };
}

// Speed-adaptive noise multipliers — single tuning point for all speed regimes.
// q: process-noise scale (higher → trust measurements more, faster response)
// r: measurement-noise scale (higher → trust model more, more stability)
function kfNoiseScale(speedMs) {
  if (speedMs < 2)  return { q: 0.25, r: 2.5 };  // stationary / walking — maximum stability
  if (speedMs < 7)  return { q: 0.6,  r: 1.5 };  // slow urban (traffic)
  if (speedMs < 15) return { q: 1.0,  r: 1.0 };  // normal city driving — baseline
  if (speedMs < 25) return { q: 1.8,  r: 0.7 };  // fast urban / arterial
  return              { q: 2.8,  r: 0.5 };        // highway — maximum responsiveness
}

function kfInit(lat, lng) {
  const P0 = [[1e-6, 0], [0, 1e-8]]; // ~110 m pos, ~0.1 deg/s vel uncertainty
  kfLat = { x: lat, v: 0, p: [P0[0].slice(), P0[1].slice()] };
  kfLng = { x: lng, v: 0, p: [P0[0].slice(), P0[1].slice()] };
  kfLastTime   = Date.now();
  kfInitialized = true;
  kfUpdateCount = 0;
}

function kfProcess(rawLat, rawLng, acc, confidence, speedMs) {
  const now = Date.now();
  const dt  = Math.min((now - kfLastTime) / 1000, 10);
  kfLastTime = now;

  if (!kfInitialized) { kfInit(rawLat, rawLng); }

  // Adaptive noise based on vehicle speed
  const ns  = kfNoiseScale(speedMs || 0);
  const qP  = KF_PROCESS_NOISE_POS * ns.q;
  const qV  = KF_PROCESS_NOISE_VEL * ns.q;

  kfLat = kf1dPredict(kfLat, dt, qP, qV);
  kfLng = kf1dPredict(kfLng, dt, qP, qV);

  // Measurement noise: accuracy + confidence + speed scaling
  const accDeg = acc / 111320;
  const R_raw  = Math.max(KF_MEAS_NOISE_BASE, accDeg * accDeg);
  const R      = R_raw * Math.exp(KF_CONF_WEIGHT_SCALE * (1 - confidence / 100)) * ns.r;

  const resLat = kf1dUpdate(kfLat, rawLat, R);
  const resLng = kf1dUpdate(kfLng, rawLng, R);
  kfLat = resLat;
  kfLng = resLng;
  kfUpdateCount++;

  return {
    lat: resLat.x, lng: resLng.x,
    gain: resLat.K,
    innovation: haversine(kfLat.x, kfLng.x, rawLat, rawLng)
  };
}

function kfPredictOnly() {
  if (!kfInitialized) return;
  const now = Date.now();
  const dt  = Math.min((now - kfLastTime) / 1000, 10);
  kfLastTime = now;
  const ns = kfNoiseScale(speedFromKf());
  kfLat = kf1dPredict(kfLat, dt, KF_PROCESS_NOISE_POS * ns.q, KF_PROCESS_NOISE_VEL * ns.q);
  kfLng = kf1dPredict(kfLng, dt, KF_PROCESS_NOISE_POS * ns.q, KF_PROCESS_NOISE_VEL * ns.q);
}

function headingFromKf() {
  if (!kfInitialized) return null;
  const cosLat = Math.cos(kfLat.x * Math.PI / 180);
  const vy = kfLat.v * 111320;        // north m/s
  const vx = kfLng.v * 111320 * cosLat; // east m/s
  if (Math.abs(vy) < 1e-6 && Math.abs(vx) < 1e-6) return null;
  return (Math.atan2(vx, vy) * 180 / Math.PI + 360) % 360;
}

function speedFromKf() {
  if (!kfInitialized) return 0;
  const cosLat = Math.cos(kfLat.x * Math.PI / 180);
  const vy = kfLat.v * 111320;
  const vx = kfLng.v * 111320 * cosLat;
  return Math.sqrt(vx * vx + vy * vy); // m/s
}

/* ── 2. GPS Quality Score (0–100) ─────────────────── */
function scoreGpsQuality(rawLat, rawLng, acc, speed, heading, now) {
  let score = 100;
  const factors = {};

  // Accuracy score
  const accScore = acc < 10 ? 100 : acc < 25 ? 90 : acc < 50 ? 75 : acc < 100 ? 55 : acc < 150 ? 30 : 0;
  factors.accuracy = accScore;

  // Time gap score
  let timeScore = 100;
  if (lastRawFix) {
    const gap = (now - lastRawFix.time) / 1000;
    timeScore = gap < 2 ? 100 : gap < 5 ? 90 : gap < 15 ? 70 : gap < 30 ? 40 : 20;
  }
  factors.time = timeScore;

  // Speed consistency
  let spdScore = 70;
  if (lastRawFix && speed !== null) {
    const dt = (now - lastRawFix.time) / 1000;
    if (dt > 0) {
      const dist = haversine(lastRawFix.lat, lastRawFix.lng, rawLat, rawLng);
      const impliedSpd = dist / dt;
      const prevSpd    = lastRawFix.speed || 0;
      const deltaSpd   = Math.abs(impliedSpd - prevSpd);
      spdScore = deltaSpd < 3 ? 100 : deltaSpd < 8 ? 85 : deltaSpd < 15 ? 65 : 40;
    }
  }
  factors.speed = spdScore;

  // Route proximity (during navigation)
  let routeScore = 80;
  if (navActive && routeCoords.length) {
    const d = findClosestRoutePoint(rawLat, rawLng).distToRoute;
    routeScore = d < 20 ? 100 : d < 50 ? 85 : d < 100 ? 65 : d < 200 ? 40 : 20;
  }
  factors.route = routeScore;

  // Weighted average
  score = Math.round(
    accScore  * 0.40 +
    timeScore * 0.15 +
    spdScore  * 0.25 +
    routeScore * 0.20
  );

  const cls = score >= 90 ? 'Excellent' : score >= 70 ? 'Good' : score >= 50 ? 'Moderate' : score >= 30 ? 'Poor' : 'Very Poor';
  return { score: Math.max(0, Math.min(100, score)), cls, factors };
}

/* ── 3. Outlier Rejection ─────────────────────────── */
function checkOutlier(rawLat, rawLng, acc, now) {
  if (acc > OUTLIER_MIN_ACCURACY) return { rejected: true, reason: 'acc>' + Math.round(acc) + 'm' };

  if (lastRawFix) {
    const dt   = Math.max(0.1, (now - lastRawFix.time) / 1000);
    const dist = haversine(lastRawFix.lat, lastRawFix.lng, rawLat, rawLng);
    if (dist > OUTLIER_MAX_JUMP_M) return { rejected: true, reason: 'jump:' + Math.round(dist) + 'm' };
    if (dist / dt > OUTLIER_MAX_SPEED_MS) return { rejected: true, reason: 'spd:' + Math.round(dist/dt) + 'm/s' };
  }

  // Innovation check only after KF is warmed up (3+ accepted fixes)
  if (kfInitialized && kfUpdateCount > 3) {
    kfLat = kf1dPredict(kfLat, Math.min((now - kfLastTime) / 1000, 10));
    kfLng = kf1dPredict(kfLng, Math.min((now - kfLastTime) / 1000, 10));
    const innov = haversine(kfLat.x, kfLng.x, rawLat, rawLng);
    if (innov > KF_MAX_INNOVATION_M) return { rejected: true, reason: 'innov:' + Math.round(innov) + 'm' };
  }

  return { rejected: false, reason: null };
}

/* ── 4. Map Matching (display only) ──────────────────*/
// confidence 0-100, speedMs in m/s.
// Snap threshold adapts: tighter at high confidence/low speed, looser otherwise.
// Search starts from currentRouteIdx to never snap backwards onto completed segments.
function mapMatchDisplay(filtLat, filtLng, confidence, speedMs) {
  if (!navActive || !routeCoords.length) return { lat: filtLat, lng: filtLng };

  // Adaptive threshold: 15 m (perfect) → 50 m (poor conf + high speed)
  const confFactor = 1 - Math.max(0, Math.min(100, confidence || 0)) / 100;
  const spdFactor  = Math.min(1, (speedMs || 0) / 20);
  const snapDist   = 15 + confFactor * 20 + spdFactor * 15;

  // Small backward buffer (−2 segments) to tolerate brief closestIdx oscillation
  const startIdx = Math.max(0, currentRouteIdx - 2);

  let bestDist = Infinity, snapLat = filtLat, snapLng = filtLng;
  for (let i = startIdx; i < routeCoords.length - 1; i++) {
    const p0 = routeCoords[i], p1 = routeCoords[i + 1];
    const cosLat = Math.cos(filtLat * Math.PI / 180);
    const x  = (filtLng - p0[1]) * cosLat * 111320;
    const y  = (filtLat - p0[0]) * 111320;
    const dx = (p1[1]  - p0[1]) * cosLat * 111320;
    const dy = (p1[0]  - p0[0]) * 111320;
    const lenSq = dx * dx + dy * dy;
    const t = lenSq > 0 ? Math.max(0, Math.min(1, (x*dx + y*dy) / lenSq)) : 0;
    const pLat = p0[0] + t * (p1[0] - p0[0]);
    const pLng = p0[1] + t * (p1[1] - p0[1]);
    const d = haversine(filtLat, filtLng, pLat, pLng);
    if (d < bestDist) { bestDist = d; snapLat = pLat; snapLng = pLng; }
  }

  if (bestDist <= snapDist) return { lat: snapLat, lng: snapLng };
  return { lat: filtLat, lng: filtLng };
}

/* ── 5. Marker Animation (rAF loop) ──────────────────*/
function startMarkerAnimation() {
  if (markerRafId !== null) return;
  markerRafId = requestAnimationFrame(markerAnimFrame);
}

function stopMarkerAnimation() {
  if (markerRafId !== null) { cancelAnimationFrame(markerRafId); markerRafId = null; }
}

function markerAnimFrame() {
  if (tgtLat === null) { markerRafId = null; return; }

  // Adaptive lerp: slow at low speed (stability), faster at highway speeds (reduced lag)
  // posAlpha: 0.03 (stopped) → 0.18 (≥35 m/s)
  // hdgAlpha: 0.05 (stopped) → 0.22 (≥35 m/s)
  const spd      = speedFromKf();
  const posAlpha = Math.max(0.03, Math.min(0.18, 0.03 + spd * 0.0043));
  const hdgAlpha = Math.max(0.05, Math.min(0.22, 0.05 + spd * 0.0049));

  dispLat += (tgtLat - dispLat) * posAlpha;
  dispLng += (tgtLng - dispLng) * posAlpha;

  let dh = tgtHdg - dispHdg;
  if (dh > 180)  dh -= 360;
  if (dh < -180) dh += 360;
  dispHdg += dh * hdgAlpha;

  if (gpsMarker) {
    gpsMarker.setLngLat([dispLng, dispLat]);
    if (gpsMarkerIsArrow) gpsMarker.setRotation(dispHdg);
  }

  markerRafId = requestAnimationFrame(markerAnimFrame);
}

/* ── 6. GPS Log ───────────────────────────────────── */
function logGpsFix(entry) {
  gpsLog.push(entry);
  if (gpsLog.length > GPS_LOG_SIZE) gpsLog.shift();
}

/* ── 7. ETA Engine ────────────────────────────────── */
function recordSpeed(speedMs) {
  speedSamples.push({ speed: speedMs, time: Date.now() });
  const cutoff = Date.now() - ETA_SPEED_WINDOW_MS;
  speedSamples = speedSamples.filter(function(s) { return s.time > cutoff; });
}

function rollingSpeedMs() {
  const moving = speedSamples.filter(function(s) { return s.speed > ETA_MIN_MOVE_MS; });
  if (moving.length < 4) return null;
  return moving.reduce(function(a, b) { return a + b.speed; }, 0) / moving.length;
}

function trafficMultiplier(fromIdx) {
  if (!trafficColors.length) return 1.0;
  const ahead = trafficColors.slice(fromIdx);
  if (!ahead.length) return 1.0;
  const slow = ahead.filter(function(c) { return c === '#f1c40f'; }).length;
  const jam  = ahead.filter(function(c) { return c === '#e74c3c'; }).length;
  return 1 + (slow * 0.20 + jam * 0.50) / ahead.length;
}

function computeEta(remainingM, fromIdx) {
  if (!routeTotalDistance || !routeTotalTimeSecs) return 0;
  const baseline = routeTotalTimeSecs * (remainingM / routeTotalDistance);
  if (baseline <= 0) return 0;

  const spd = rollingSpeedMs();
  const speedBased = spd ? remainingM / spd : baseline;
  const tMult = trafficMultiplier(fromIdx);
  const blended = ((1 - ETA_BLEND_ALPHA) * baseline + ETA_BLEND_ALPHA * speedBased) * tMult;

  // Smooth — initialise on first call per trip
  if (etaSmoothed === 0) { etaSmoothed = blended; return blended; }
  etaSmoothed = etaSmoothed * (1 - ETA_SMOOTH_ALPHA) + blended * ETA_SMOOTH_ALPHA;
  return etaSmoothed;
}

/* ── 8. Diagnostic overlay ────────────────────────── */
function updateDiag(quality, acc, spd, hdg, kgain, innov, rawLat, rawLng) {
  if (!DIAG_MODE) return;
  const drift = (navLat !== null)
    ? Math.round(haversine(rawLat, rawLng, navLat, navLng))
    : 0;
  const lerp = tgtLat ? Math.round(haversine(dispLat, dispLng, tgtLat, tgtLng)) : 0;
  $('dv-score').textContent   = quality.score + ' (' + quality.cls + ')';
  $('dv-acc').textContent     = Math.round(acc) + ' m';
  $('dv-spd').textContent     = (spd * 3.6).toFixed(1) + ' km/h';
  $('dv-hdg').textContent     = Math.round(hdg || 0) + '°';
  $('dv-gain').textContent    = kgain.toFixed(4);
  $('dv-rej').textContent     = rejectedCount;
  $('dv-drift').textContent   = drift + ' m';
  $('dv-lerp').textContent    = lerp + ' m';
  $('dv-innov').textContent   = Math.round(innov) + ' m';
}

/* ── Camera Look-Ahead ─────────────────────────────── */
// Returns a [lng, lat] point that is LOOKAHEAD meters ahead of the vehicle.
// Centering the map here places the vehicle in the lower portion of the viewport,
// giving the driver more road visibility. Distance scales with speed.
function cameraLookAheadCenter(lat, lng, headingDeg, speedMs) {
  const base      = Math.min(LOOKAHEAD_BASE_M + speedMs * LOOKAHEAD_SCALE, LOOKAHEAD_MAX_M);
  const turnBoost = Math.min(28, headingChangeRate * 1.3);  // extra metres during turns
  const d         = base + turnBoost;
  const hdgRad    = headingDeg * Math.PI / 180;
  const cosLat    = Math.cos(lat * Math.PI / 180);
  const dLat      = (d * Math.cos(hdgRad)) / 111320;
  const dLng      = (d * Math.sin(hdgRad)) / (111320 * cosLat);
  return [lng + dLng, lat + dLat];
}

/* ── Map init ──────────────────────────────────────── */
function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/liberty',
    center: CHENNAI_CENTER,
    zoom: 13,
    pitch: 0,
    bearing: 0,
    attributionControl: true
  });

  map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'bottom-right');
  map.addControl(new maplibregl.GeolocateControl({
    positionOptions: { enableHighAccuracy: true },
    trackUserLocation: false,
    showUserHeading: true
  }), 'bottom-right');

  map.on('load', function() {
    addRouteSources();
    addTrafficLayer();
    addAccuracyLayer();
    initHandlers();

    // Hide the style's built-in fill-extrusion layer so default view stays 2D.
    // It is re-shown only when the user enables "3D Buildings".
    map.setLayoutProperty('building-3d', 'visibility', 'none');

    // Dismiss initial splash
    $('splash').classList.add('fade-out');
    setTimeout(function() { $('splash').style.display = 'none'; }, 450);

    // Auto-refresh traffic (first hit after 8s, then every 3 min)
    setTimeout(refreshTraffic, 8000);
    setInterval(refreshTraffic, TRAFFIC_REFRESH_MS);
  });

  map.on('dragstart', function() {
    if (!navActive) return;
    following = false;
    $('recentre').classList.add('visible');
  });

  map.on('click', function(e) {

}

function geojsonSource(data) { return { type: 'geojson', data: data }; }

function lineFeature(latLngs) {
  return { type: 'Feature', properties: {},
    geometry: { type: 'LineString', coordinates: latLngs.map(toLngLat) } };
}

function circleFeature(lat, lng, radiusMeters) {
  if (!radiusMeters) return { type: 'FeatureCollection', features: [] };
  const points = [], steps = 64;
  for (let i = 0; i <= steps; i++) {
    const a = i / steps * Math.PI * 2;
    const dLat = (radiusMeters / 111320) * Math.cos(a);
    const dLng = (radiusMeters / (111320 * Math.cos(lat * Math.PI / 180))) * Math.sin(a);
    points.push([lng + dLng, lat + dLat]);
  }
  return { type: 'Feature', properties: {},
    geometry: { type: 'Polygon', coordinates: [points] } };
}

/* ── Search Manager ────────────────────────────────── */
function loadSearchHistory() {
  try {
    searchCache    = JSON.parse(localStorage.getItem('pn_scache') || '{}');
    recentSearches = JSON.parse(localStorage.getItem('pn_recent') || '[]');
  } catch(e) { searchCache = {}; recentSearches = []; }
}

function saveCache() {
  try {
    const keys = Object.keys(searchCache);
    if (keys.length > SEARCH_CACHE_SIZE) {
      const keep = {};
      keys.slice(-SEARCH_CACHE_SIZE).forEach(function(k) { keep[k] = searchCache[k]; });
      searchCache = keep;
    }
    localStorage.setItem('pn_scache', JSON.stringify(searchCache));
  } catch(e) {}
}

function addRecentSearch(name, lat, lng) {
  recentSearches = recentSearches.filter(function(r) { return r.name !== name; });
  recentSearches.unshift({ name: name, lat: lat, lng: lng });
  recentSearches = recentSearches.slice(0, 10);
  try { localStorage.setItem('pn_recent', JSON.stringify(recentSearches)); } catch(e) {}
}

function escHtml(s) {
  return String(s || '').replace(/[&<>"']/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

function normTomTom(r) {
  const pos  = r.position || {};
  const poi  = r.poi || {};
  const addr = r.address || {};
  const name = poi.name || (addr.freeformAddress || '').split(',')[0] || addr.municipality || 'Place';
  return {
    lat: pos.lat, lng: pos.lon,
    name: name,
    address: addr.freeformAddress || '',
    score: (r.score || 5) / 10,
    provider: 'tt',
    resultType: r.type || '',
    entityType: r.entityType || ''
  };
}

function normNominatim(r) {
  const parts   = (r.display_name || '').split(',');
  const cls     = r.class || '';
  const isGeo   = cls === 'place' || cls === 'boundary' || cls === 'administrative';
  const isMunic = r.type === 'city' || r.type === 'town' || r.type === 'state' || r.type === 'country';
  return {
    lat: parseFloat(r.lat), lng: parseFloat(r.lon),
    name: parts.slice(0, 2).join(',').trim(),
    address: r.display_name || '',
    score: r.importance || 0.3,
    provider: 'nom',
    resultType: isGeo ? 'Geography' : 'POI',
    entityType: isMunic ? 'Municipality' : ''
  };
}

function proximityScore(lat, lng) {
  if (!userLat || lat == null || lng == null) return 0.5;
  return Math.max(0, 1 - haversine(userLat, userLng, lat, lng) / 50000);
}

// Classify query intent from text heuristics and result metadata.
// Used to set the proximity weight: city searches should NOT be dominated by
// nearby irrelevant matches; street-level searches should be.
function classifyQuery(q, items) {
  const lq = q.toLowerCase().trim();

  // Explicit local-area suffixes → maximise proximity
  const localWords = ['nagar', 'colony', 'street', 'road', 'layout', 'sector', 'junction',
                      'gate', 'cross', 'circle', 'marg', 'chowk', 'bazaar', 'district'];
  if (localWords.some(function(w) { return lq.indexOf(w) !== -1; })) return 'local';

  // If TomTom returns a major administrative entity as a top result → city/country search
  const geoHit = items.slice(0, 2).find(function(r) {
    return r.resultType === 'Geography' &&
      (r.entityType === 'Municipality' || r.entityType === 'Country' ||
       r.entityType === 'CountrySubdivision' || r.entityType === 'CountrySecondarySubdivision');
  });
  if (geoHit) return 'geo';

  return 'poi';  // balanced default
}

function deduplicateAndRank(items, query) {
  const out = [];
  items.forEach(function(r) {
    if (r.lat == null || r.lng == null) return;
    if (out.some(function(e) { return haversine(e.lat, e.lng, r.lat, r.lng) < 80; })) return;
    out.push(r);
  });

  const intent = classifyQuery(query || '', out);
  // proxW: share of score that goes to GPS proximity
  //   geo   → near-zero — "Mumbai" must beat a nearby place with the word "Mumbai"
  //   local → dominant — nearby "Anna Nagar" beats a distant one
  //   poi   → moderate  — default for most queries
  const proxW  = intent === 'geo'   ? 0.05
               : intent === 'local' ? 0.55
               :                      0.35;
  const scoreW = 1 - proxW;

  out.sort(function(a, b) {
    const sa = proximityScore(a.lat, a.lng) * proxW + a.score * scoreW;
    const sb = proximityScore(b.lat, b.lng) * proxW + b.score * scoreW;
    return sb - sa;
  });
  return out.slice(0, 6);
}

async function fetchTomTom(query, signal) {
  const prox = userLat ? '&lat=' + userLat + '&lon=' + userLng + '&radius=30000' : '';
  const url = 'https://api.tomtom.com/search/2/search/' + encodeURIComponent(query) +
    '.json?key=' + TT_KEY + '&limit=6&countrySet=IN' + prox + '&language=en-GB';
  const r = await fetch(url, { signal: signal });
  if (!r.ok) throw new Error('TT ' + r.status);
  return ((await r.json()).results || []).map(normTomTom);
}

async function fetchNominatim(query, signal) {
  const prox = userLat
    ? '&viewbox=' + (userLng-0.5) + ',' + (userLat-0.4) + ',' + (userLng+0.5) + ',' + (userLat+0.4)
    : '&viewbox=79.8,12.3,80.5,13.5';
  const url = 'https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(query) +
    '&format=json&limit=6' + prox + '&bounded=0&countrycodes=in&addressdetails=1&accept-language=en';
  const r = await fetch(url, { signal: signal, headers: { 'User-Agent': 'PrivNav/2.0' } });
  if (!r.ok) throw new Error('Nom ' + r.status);
  return (await r.json()).map(normNominatim);
}

async function smartSearch(query, ctrl) {
  const key = query.toLowerCase().trim();
  if (searchCache[key]) return searchCache[key];
  const sig = ctrl.signal;
  let results;
  try {
    const ttR = await fetchTomTom(query, sig);
    if (ttR.length >= 3) {
      results = deduplicateAndRank(ttR, query);
    } else {
      const nomR = await fetchNominatim(query, sig);
      results = deduplicateAndRank([].concat(ttR, nomR), query);
    }
  } catch(e) {
    if (e.name === 'AbortError') throw e;
    try {
      results = deduplicateAndRank(await fetchNominatim(query, sig), query);
    } catch(e2) {
      if (e2.name === 'AbortError') throw e2;
      throw new Error('Search failed');
    }
  }
  if (results && results.length) { searchCache[key] = results; saveCache(); }
  return results || [];
}

function renderResults(items, resultsEl, onPick) {
  resultsEl.innerHTML = '';
  if (!items || !items.length) {
    resultsEl.innerHTML = '<div class="result"><div class="result-name">No results</div></div>';
    resultsEl.style.display = 'block';
    return;
  }
  resultsEl.style.display = 'block';
  items.forEach(function(r) {
    const el = document.createElement('div');
    el.className = 'result';
    const badge = r.provider === 'recent' ? '<span class="result-badge">↺</span>' : '';
    el.innerHTML = '<div class="result-name">' + badge + escHtml(r.name) + '</div>' +
      (r.address && r.address !== r.name ? '<div class="result-addr">' + escHtml(r.address) + '</div>' : '');
    el.addEventListener('click', function() { onPick(r); });
    resultsEl.appendChild(el);
  });
}

function bindSearch(kind) {
  const input   = $(kind + '-input');
  const results = $(kind + '-results');
  let timer = null, searchCtrl = null;

  function onPick(r) {
    const lat = parseFloat(r.lat), lng = parseFloat(r.lng);
    input.value = r.name;
    results.style.display = 'none';
    results.innerHTML = '';
    if (kind === 'origin') setOrigin(lat, lng, r.name);
    else setDest(lat, lng, r.name);
    map.easeTo({ center: [lng, lat], zoom: 15, duration: 600 });
    addRecentSearch(r.name, lat, lng);
  }

  input.addEventListener('focus', function() {
    if (input.value.trim().length < SEARCH_MIN_CHARS && recentSearches.length) {
      renderResults(recentSearches.slice(0, 5).map(function(r) {
        return { lat: r.lat, lng: r.lng, name: r.name, address: '', score: 1.0, provider: 'recent' };
      }), results, onPick);
    }
  });

  input.addEventListener('blur', function() {
    setTimeout(function() { results.style.display = 'none'; }, 200);
  });

  input.addEventListener('input', function() {
    clearTimeout(timer);
    if (searchCtrl) { searchCtrl.abort(); searchCtrl = null; }
    const q = input.value.trim();
    if (q.length < SEARCH_MIN_CHARS) { results.style.display = 'none'; results.innerHTML = ''; return; }

    const recentMatches = recentSearches
      .filter(function(r) { return r.name.toLowerCase().indexOf(q.toLowerCase()) !== -1; })
      .slice(0, 3)
      .map(function(r) { return { lat: r.lat, lng: r.lng, name: r.name, address: '', score: 1.0, provider: 'recent' }; });

    if (recentMatches.length) {
      renderResults(recentMatches, results, onPick);
    } else {
      results.style.display = 'block';
      results.innerHTML = '<div class="result"><div class="result-name">Searching…</div></div>';
    }

    timer = setTimeout(function() {
      searchCtrl = new AbortController();
      const ctrl = searchCtrl;
      smartSearch(q, ctrl).then(function(live) {
        const merged = deduplicateAndRank(
          recentMatches.map(function(r) { return { lat: r.lat, lng: r.lng, name: r.name, address: r.address, score: 2.0, provider: 'recent' }; })
            .concat(live),
          q
        );
        renderResults(merged, results, onPick);
      }).catch(function(e) {
        if (e.name === 'AbortError') return;
        if (!recentMatches.length) results.innerHTML = '<div class="result"><div class="result-name">Search failed</div></div>';
        dbg('Search: ' + e.message);
      });
    }, SEARCH_DEBOUNCE_MS);
  });
}

  '</svg>';
