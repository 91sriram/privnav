<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0f14">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>PrivNav</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface-2: #1d2230;
    --border: #2b3140;
    --text: #e6e9f2;
    --muted: #8891a5;
    --accent: #4f8ef7;
    --free: #2ecc71;
    --slow: #f1c40f;
    --jam: #e74c3c;
    --font: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "SFMono-Regular", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }

  /* ── Splash ──────────────────────────────────────── */
  #splash {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: opacity 0.45s ease;
  }
  #splash.fade-out { opacity: 0; pointer-events: none; }
  #splash-icon { margin-bottom: 14px; }
  #splash-title {
    font-size: 46px;
    font-weight: 900;
    letter-spacing: -2px;
    color: var(--text);
  }
  #splash-sub {
    margin-top: 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    min-height: 16px;
  }
  #splash-ring {
    width: 60px;
    height: 60px;
    border: 3px solid rgba(79,142,247,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 18px;
    display: none;
  }
  #splash.loading #splash-ring { display: block; animation: spin 1s linear infinite; }
  #splash.loading #splash-icon { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── App shell ───────────────────────────────────── */
  #app { height: 100%; display: flex; flex-direction: column; }
  #topbar {
    height: 54px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: rgba(13,15,20,0.96);
    border-bottom: 1px solid var(--border);
    z-index: 5;
    overflow: hidden;
  }
  #brand { font-weight: 900; letter-spacing: -0.5px; white-space: nowrap; font-size: 15px; }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 28px;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    white-space: nowrap;
  }
  .pill.ok  { color: var(--free); border-color: rgba(46,204,113,0.5); }
  .pill.warn { color: var(--slow); border-color: rgba(241,196,15,0.5); }
  .pill.err  { color: var(--jam);  border-color: rgba(231,76,60,0.5); }
  .pill.active { color: var(--accent); border-color: rgba(79,142,247,0.5); }
  #pill-voice { cursor: pointer; user-select: none; }

  /* ── Map area ────────────────────────────────────── */
  #map-wrap { flex: 1; position: relative; min-height: 0; }
  #map { position: absolute; inset: 0; }

  /* ── Panel ───────────────────────────────────────── */
  #panel {
    position: absolute;
    top: 12px;
    right: 12px;
    width: min(360px, calc(100vw - 24px));
    max-height: calc(100% - 24px);
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px;
    background: rgba(21,24,32,0.95);
    border: 1px solid var(--border);
    border-radius: 8px;
    z-index: 3;
    overflow: auto;
    box-shadow: 0 12px 32px rgba(0,0,0,0.38);
  }
  #panel-min-row {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  #panel-min-label { font-size: 10px; font-family: var(--mono); color: var(--muted); display: none; margin-right: auto; }
  #panel.minimized #panel-min-label { display: block; }
  #panel.minimized #panel-body { display: none; }
  #panel.minimized { gap: 0; padding: 6px 8px; }

  .row   { display: flex; gap: 8px; align-items: center; }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  label  { font-size: 10px; color: var(--muted); font-family: var(--mono); }

  input {
    width: 100%;
    min-height: 38px;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #0f1219;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  button {
    min-height: 38px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface-2);
    color: var(--text);
    font-weight: 700;
    cursor: pointer;
  }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.danger  { background: var(--jam);    border-color: var(--jam);    color: #fff; }
  button.icon    { width: 42px; flex: 0 0 42px; font-size: 18px; display: flex; align-items: center; justify-content: center; }

  /* GPS origin button */
  #origin-gps { color: var(--muted); transition: color 0.2s, border-color 0.2s; }
  #origin-gps.active { color: var(--accent); border-color: rgba(79,142,247,0.6); animation: gps-pulse 1s ease-in-out infinite; }
  @keyframes gps-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }

  /* 3D button (inside panel header) */
  #btn-3d {
    font-size: 10px;
    font-family: var(--mono);
    font-weight: 700;
    padding: 4px 9px;
    min-height: unset;
    height: 28px;
    border-radius: 5px;
    color: var(--muted);
    white-space: nowrap;
  }
  #btn-3d.active { color: var(--accent); border-color: rgba(79,142,247,0.5); }

  .results {
    display: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    background: #10141c;
  }
  .result { padding: 8px 10px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .result:last-child { border-bottom: 0; }
  .result-name { font-size: 13px; font-weight: 700; }
  .result-addr { margin-top: 2px; font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Nav HUD ─────────────────────────────────────── */
  #nav-hud {
    display: none;
    position: absolute;
    top: 12px;
    left: 12px;
    width: min(420px, calc(100vw - 24px));
    z-index: 4;
    pointer-events: none;
  }
  #nav-hud.active { display: block; }
  .hud-card {
    background: rgba(21,24,32,0.96);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.38);
    overflow: hidden;
  }
  #maneuver { display: flex; gap: 12px; align-items: center; padding: 14px; background: var(--accent); }
  #nav-arrow    { font-size: 42px; line-height: 1; }
  #nav-instruction { font-size: 16px; font-weight: 800; line-height: 1.25; }
  #nav-distance    { margin-top: 2px; font-family: var(--mono); font-size: 14px; opacity: 0.9; }
  #nav-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); }
  .meta { padding: 8px; background: var(--surface); text-align: center; }
  .meta strong { display: block; font-family: var(--mono); font-size: 14px; }
  .meta span   { display: block; margin-top: 2px; color: var(--muted); font-size: 9px; font-family: var(--mono); }

  /* ── Recentre button ─────────────────────────────── */
  #recentre {
    position: absolute;
    right: 14px;
    bottom: 88px;
    z-index: 4;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    background: rgba(21,24,32,0.96);
    color: var(--accent);
    border-color: var(--accent);
  }
  #recentre.visible { display: flex; }

  /* ── Markers ─────────────────────────────────────── */
  .gps-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid #fff;
    box-shadow: 0 0 0 4px rgba(79,142,247,0.35);
  }
  .pin {
    width: 22px; height: 22px;
    border-radius: 50% 50% 50% 4px;
    transform: rotate(-45deg);
    border: 2px solid #fff;
    display: grid;
    place-items: center;
    font-size: 10px;
    font-weight: 800;
  }
  .pin span { transform: rotate(45deg); }
  .incident-marker { font-size: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

  /* ── Route preview sheet ─────────────────────────── */
  #route-preview {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    z-index: 8;
    background: rgba(17,20,28,0.98);
    border-top: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    padding: 18px 16px 32px;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
  }
  #route-preview.visible { transform: translateY(0); pointer-events: auto; }
  #rp-handle {
    width: 38px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 14px;
  }
  #rp-header {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: 0.08em;
  }
  #rp-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  #rp-stats .meta { background: var(--surface); }
  #rp-stats .meta strong { font-size: 18px; }
  #rp-stats .meta span  { font-size: 9px; }

  /* ── Float stop button ───────────────────────────── */
  #nav-stop-float {
    display: none;
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    min-height: unset;
    padding: 13px 36px;
    background: var(--jam);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    font-weight: 800;
    box-shadow: 0 4px 20px rgba(231,76,60,0.45);
    white-space: nowrap;
  }
  #nav-stop-float.visible { display: block; }
  @media (min-width: 721px) { #nav-stop-float { display: none !important; } }

  /* ── Toast / Debug ───────────────────────────────── */
  #toast {
    position: absolute;
    left: 50%; bottom: 18px;
    transform: translateX(-50%);
    z-index: 5;
    display: none;
    max-width: calc(100vw - 24px);
    padding: 9px 12px;
    background: rgba(21,24,32,0.98);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 12px;
    box-shadow: 0 10px 26px rgba(0,0,0,0.4);
  }
  #debug {
    display: none;
    position: absolute;
    left: 12px; bottom: 12px;
    z-index: 3;
    max-width: min(420px, calc(100vw - 24px));
    max-height: 160px;
    overflow: auto;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: rgba(15,18,25,0.92);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
  }

  /* ── Mobile ──────────────────────────────────────── */
  @media (max-width: 720px) {
    #topbar { gap: 6px; }
    #brand  { font-size: 13px; }
    .pill   { font-size: 10px; padding-inline: 6px; }
    #panel  { top: auto; right: 8px; left: 8px; bottom: 8px; width: auto; max-height: 44%; }
    #panel.nav-mode { display: none; }
    #route-preview { border-radius: 14px 14px 0 0; }
  }
</style>
</head>
<body>

<!-- ── Splash screen ──────────────────────────────── -->
<div id="splash" class="loading">
  <div id="splash-ring"></div>
  <div id="splash-icon">
    <svg viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12,2 19,21 12,17 5,21"/>
    </svg>
  </div>
  <div id="splash-title">PrivNav</div>
  <div id="splash-sub">Loading map...</div>
</div>

<div id="app">
  <div id="topbar">
    <div id="brand">PrivNav</div>
    <div id="pill-gps" class="pill">NO GPS</div>
    <div id="pill-traffic" class="pill">TRAFFIC IDLE</div>
    <div id="pill-camera" class="pill">NORTH-UP</div>
    <div id="pill-voice" class="pill ok" title="Toggle voice">VOICE</div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>

    <!-- Nav HUD -->
    <div id="nav-hud">
      <div class="hud-card">
        <div id="maneuver">
          <div id="nav-arrow">↑</div>
          <div>
            <div id="nav-instruction">Starting navigation</div>
            <div id="nav-distance">--</div>
          </div>
        </div>
        <div id="nav-meta">
          <div class="meta"><strong id="meta-eta">--:--</strong><span>ETA</span></div>
          <div class="meta"><strong id="meta-dist">--</strong><span>LEFT</span></div>
          <div class="meta"><strong id="meta-step">--</strong><span>STEP</span></div>
        </div>
      </div>
    </div>

    <button id="recentre" title="Recenter">◎</button>

    <!-- Float stop button (mobile only) -->
    <button id="nav-stop-float">End Navigation</button>

    <!-- Route preview sheet -->
    <div id="route-preview">
      <div id="rp-handle"></div>
      <div id="rp-header">ROUTE PREVIEW</div>
      <div id="rp-stats">
        <div class="meta"><strong id="rp-dist">--</strong><span>DISTANCE</span></div>
        <div class="meta"><strong id="rp-time">--</strong><span>DURATION</span></div>
        <div class="meta"><strong id="rp-eta">--:--</strong><span>ETA</span></div>
      </div>
      <div class="row">
        <button id="rp-cancel" style="flex:1">Cancel</button>
        <button id="rp-start" class="primary" style="flex:2">Start Navigation</button>
      </div>
    </div>

    <!-- Side panel -->
    <div id="panel">
      <div id="panel-min-row">
        <span id="panel-min-label">MENU</span>
        <button id="btn-3d" title="Toggle 3D buildings">3D Buildings</button>
        <button class="icon" id="panel-toggle" title="Minimize panel">−</button>
      </div>
      <div id="panel-body">
        <div class="stack">
          <label>Origin</label>
          <div class="row">
            <input id="origin-input" placeholder="Search or use GPS" autocomplete="off">
            <button class="icon" id="origin-gps" title="Get GPS location">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                <circle cx="12" cy="12" r="4"/>
                <line x1="12" y1="2" x2="12" y2="7"/>
                <line x1="12" y1="17" x2="12" y2="22"/>
                <line x1="2"  y1="12" x2="7"  y2="12"/>
                <line x1="17" y1="12" x2="22" y2="12"/>
              </svg>
            </button>
          </div>
          <div id="origin-results" class="results"></div>
        </div>
        <div class="stack">
          <label>Where to?</label>
          <input id="dest-input" placeholder="Search destination" autocomplete="off">
          <div id="dest-results" class="results"></div>
        </div>
        <div class="row">
          <button id="route-btn" class="primary" style="flex:1">Route</button>
          <button id="nav-btn"   class="primary" style="flex:1">Navigate</button>
        </div>
        <!-- Hidden — kept so existing JS references don't throw -->
        <button id="traffic-btn" style="display:none">Refresh Traffic</button>
        <button id="debug-btn"   style="display:none">Debug</button>
      </div>
    </div>

    <div id="toast"></div>
    <div id="debug"></div>
  </div>
</div>

<script>
const GH_KEY = '10eb47ca-323f-45aa-a666-c55978a75e6a';
const TT_KEY = 'z0q4MOEZiJYluDAhrU2tyW88EuR2Soz0';
const CHENNAI_CENTER = [80.2707, 13.0827];
const NAV_ZOOM = 17;
const NAV_PITCH = 48;
const OFF_ROUTE_THRESHOLD = 65;
const GPS_WATCH_OPTIONS = { enableHighAccuracy: true, maximumAge: 1000, timeout: 20000 };
const GPS_POLL_MS = 3000;
const GPS_TIMEOUT_MS = 12000;
const TRAFFIC_REFRESH_MS = 3 * 60 * 1000;

let map;
let gpsMarker = null;
let accuracySourceReady = false;
let originMarker = null;
let destMarker = null;
let incidentMarkers = [];
let origin = null;
let dest = null;
let currentRoute = null;
let routeCoords = [];
let navSteps = [];
let navStep = 0;
let navActive = false;
let following = true;
let userLat = null;
let userLng = null;
let lastAccuracy = null;
let gpsWatchId = null;
let gpsPollTimer = null;
let gpsPollInFlight = false;
let headingSmoothed = 0;
let headingHistory = [];
let compassAvailable = false;
let lastGpsLat = null;
let lastGpsLng = null;
let wakeLock = null;
let routeTotalDistance = 0;
let routeTotalTimeSecs = 0;
let debugLines = [];
let pendingFlyToGps = false;
let is3D = false;
let trafficColors = [];          // per-routeCoords-index color string
let lastTrafficRouteUpdate = 0;
let offRouteCount = 0;           // consecutive off-route GPS readings
let lastOffRouteWarnTime = 0;

// Voice state
let voiceMuted = false;
let lastSpokenStep = -1;
let voiceThresholdsFired = {};
let iosTtsTimer = null;

function $(id) { return document.getElementById(id); }

function setPill(id, cls, text) {
  const el = $(id);
  el.className = 'pill ' + (cls || '');
  el.textContent = text;
}

function toast(text) {
  const el = $('toast');
  el.textContent = text;
  el.style.display = 'block';
  clearTimeout(toast._t);
  toast._t = setTimeout(function(){ el.style.display = 'none'; }, 2600);
}

function dbg(msg) {
  const line = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  debugLines.unshift(line);
  debugLines = debugLines.slice(0, 30);
  $('debug').innerHTML = debugLines.join('<br>');
}

function toLngLat(latLng) { return [latLng[1], latLng[0]]; }
function toLatLng(lngLat) { return [lngLat[1], lngLat[0]]; }

/* ── Splash ────────────────────────────────────────── */
function showSplash(subtitle, duration, onDone) {
  const el = $('splash');
  $('splash-sub').textContent = subtitle || '';
  el.classList.remove('fade-out', 'loading');
  el.style.display = 'flex';
  void el.offsetHeight; // force reflow so transition restarts
  setTimeout(function() {
    el.classList.add('fade-out');
    setTimeout(function() {
      el.style.display = 'none';
      if (onDone) onDone();
    }, 450);
  }, duration || 1400);
}

function flyToGpsWithSplash(lat, lng) {
  showSplash('', 1100, function() {
    map.easeTo({ center: [lng, lat], zoom: 16, duration: 800 });
  });
}

/* ── Voice / TTS ───────────────────────────────────── */
function speak(text) {
  if (voiceMuted || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 1.0;
  utt.volume = 1;
  window.speechSynthesis.speak(utt);
}

function startIosTtsKeepalive() {
  iosTtsTimer = setInterval(function() {
    if (window.speechSynthesis && window.speechSynthesis.paused) window.speechSynthesis.resume();
  }, 5000);
}

function stopIosTtsKeepalive() {
  clearInterval(iosTtsTimer);
  iosTtsTimer = null;
}

function announceNavUpdate(stepIdx, progress) {
  if (!navSteps.length) return;
  const step = navSteps[stepIdx];
  if (!step) return;

  if (stepIdx !== lastSpokenStep) {
    lastSpokenStep = stepIdx;
    voiceThresholdsFired = {};
    const isArrival = stepIdx === navSteps.length - 1;
    speak(isArrival ? 'You have arrived at your destination' : step.instruction);
    return;
  }

  const next = navSteps[stepIdx + 1];
  if (!next) return;
  const distToNext = Math.max(0, next.distFromStart - progress);
  [500, 200].forEach(function(threshold) {
    if (distToNext > 0 && distToNext <= threshold && !voiceThresholdsFired[threshold]) {
      voiceThresholdsFired[threshold] = true;
      const distStr = threshold < 1000 ? threshold + ' metres' : (threshold / 1000) + ' kilometres';
      speak('In ' + distStr + ', ' + next.instruction);
    }
  });
}

/* ── Route preview sheet ───────────────────────────── */
function showRoutePreview() {
  $('rp-dist').textContent = formatDist(routeTotalDistance);
  const mins = Math.round(routeTotalTimeSecs / 60);
  $('rp-time').textContent = mins < 60
    ? mins + ' min'
    : Math.floor(mins / 60) + 'h ' + (mins % 60) + 'm';
  const eta = new Date(Date.now() + routeTotalTimeSecs * 1000);
  $('rp-eta').textContent = eta.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  $('route-preview').classList.add('visible');
}

function hideRoutePreview() {
  $('route-preview').classList.remove('visible');
}

/* ── Map init ──────────────────────────────────────── */
function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/liberty',
    center: CHENNAI_CENTER,
    zoom: 13,
    pitch: 0,
    bearing: 0,
    attributionControl: true
  });

  map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'bottom-right');
  map.addControl(new maplibregl.GeolocateControl({
    positionOptions: { enableHighAccuracy: true },
    trackUserLocation: false,
    showUserHeading: true
  }), 'bottom-right');

  map.on('load', function() {
    addRouteSources();
    addTrafficLayer();
    addAccuracyLayer();
    initHandlers();

    // Hide the style's built-in fill-extrusion layer so default view stays 2D.
    // It is re-shown only when the user enables "3D Buildings".
    map.setLayoutProperty('building-3d', 'visibility', 'none');

    // Dismiss initial splash
    $('splash').classList.add('fade-out');
    setTimeout(function() { $('splash').style.display = 'none'; }, 450);

    // Auto-refresh traffic (first hit after 8s, then every 3 min)
    setTimeout(refreshTraffic, 8000);
    setInterval(refreshTraffic, TRAFFIC_REFRESH_MS);
  });

  map.on('dragstart', function() {
    if (!navActive) return;
    following = false;
    $('recentre').classList.add('visible');
  });

  map.on('click', function(e) {
    if (navActive) return;
    if (!origin) {
      setOrigin(e.lngLat.lat, e.lngLat.lng, 'Picked origin');
      toast('Origin set. Tap/search destination.');
    } else {
      setDest(e.lngLat.lat, e.lngLat.lng, 'Picked destination');
      toast('Destination set.');
    }
  });
}

function addRouteSources() {
  map.addSource('route', geojsonSource(lineFeature([])));
  map.addLayer({ id: 'route-casing', type: 'line', source: 'route',
    paint: { 'line-color': '#0b0d12', 'line-width': 9, 'line-opacity': 0.9 } });
  map.addLayer({ id: 'route-line', type: 'line', source: 'route',
    paint: { 'line-color': '#4f8ef7', 'line-width': 5, 'line-opacity': 0.95 } });

  map.addSource('traffic-route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
  map.addLayer({
    id: 'traffic-route',
    type: 'line',
    source: 'traffic-route',
    layout: { 'line-join': 'round', 'line-cap': 'round' },
    paint: {
      'line-color': ['coalesce', ['get', 'color'], '#4f8ef7'],
      'line-width': 6,
      'line-opacity': 0.95
    }
  });
}

function addTrafficLayer() {
  map.addSource('tomtom-flow', {
    type: 'raster',
    tiles: ['https://api.tomtom.com/traffic/map/4/tile/flow/relative0/{z}/{x}/{y}.png?key=' + TT_KEY + '&tileSize=256'],
    tileSize: 256
  });
  map.addLayer({ id: 'tomtom-flow', type: 'raster', source: 'tomtom-flow',
    paint: { 'raster-opacity': 0.72 } });
}

function addAccuracyLayer() {
  map.addSource('accuracy', geojsonSource(circleFeature(0, 0, 0)));
  map.addLayer({ id: 'accuracy-fill', type: 'fill', source: 'accuracy',
    paint: { 'fill-color': '#4f8ef7', 'fill-opacity': 0.12 } });
  map.addLayer({ id: 'accuracy-line', type: 'line', source: 'accuracy',
    paint: { 'line-color': '#4f8ef7', 'line-width': 1, 'line-opacity': 0.45 } });
  accuracySourceReady = true;
}

function geojsonSource(data) { return { type: 'geojson', data: data }; }

function lineFeature(latLngs) {
  return { type: 'Feature', properties: {},
    geometry: { type: 'LineString', coordinates: latLngs.map(toLngLat) } };
}

function circleFeature(lat, lng, radiusMeters) {
  if (!radiusMeters) return { type: 'FeatureCollection', features: [] };
  const points = [], steps = 64;
  for (let i = 0; i <= steps; i++) {
    const a = i / steps * Math.PI * 2;
    const dLat = (radiusMeters / 111320) * Math.cos(a);
    const dLng = (radiusMeters / (111320 * Math.cos(lat * Math.PI / 180))) * Math.sin(a);
    points.push([lng + dLng, lat + dLat]);
  }
  return { type: 'Feature', properties: {},
    geometry: { type: 'Polygon', coordinates: [points] } };
}

/* ── Event handlers ────────────────────────────────── */
function initHandlers() {
  $('origin-gps').addEventListener('click', useGpsOrigin);
  $('route-btn').addEventListener('click', calculateRoute);
  $('nav-btn').addEventListener('click', toggleNavigation);
  $('traffic-btn').addEventListener('click', refreshTraffic);
  $('recentre').addEventListener('click', recentre);
  $('nav-stop-float').addEventListener('click', stopNavigation);

  // Route preview buttons
  $('rp-start').addEventListener('click', function() {
    hideRoutePreview();
    startNavigation();
  });
  $('rp-cancel').addEventListener('click', hideRoutePreview);

  // Panel minimize
  $('panel-toggle').addEventListener('click', function() {
    const minimized = $('panel').classList.toggle('minimized');
    $('panel-toggle').textContent = minimized ? '+' : '−';
  });

  // 3D toggle
  $('btn-3d').addEventListener('click', function() {
    if (navActive) return;
    is3D = !is3D;
    $('btn-3d').classList.toggle('active', is3D);
    // Swap 2-D flat footprints ↔ fill-extrusion buildings
    map.setLayoutProperty('building',    'visibility', is3D ? 'none'    : 'visible');
    map.setLayoutProperty('building-3d', 'visibility', is3D ? 'visible' : 'none');
    map.easeTo({ pitch: is3D ? 55 : 0, duration: 600 });
  });

  // Voice mute toggle
  $('pill-voice').addEventListener('click', function() {
    voiceMuted = !voiceMuted;
    setPill('pill-voice', voiceMuted ? 'warn' : 'ok', voiceMuted ? 'MUTED' : 'VOICE');
    if (voiceMuted && window.speechSynthesis) window.speechSynthesis.cancel();
  });

  // Debug toggle (button hidden but keyboard accessible for dev)
  $('debug-btn').addEventListener('click', function() {
    $('debug').style.display = $('debug').style.display === 'block' ? 'none' : 'block';
  });

  bindSearch('origin');
  bindSearch('dest');
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
}

function bindSearch(kind) {
  const input = $(kind + '-input');
  const results = $(kind + '-results');
  let timer = null;
  input.addEventListener('input', function() {
    clearTimeout(timer);
    const q = input.value.trim();
    if (q.length < 3) { results.style.display = 'none'; results.innerHTML = ''; return; }
    timer = setTimeout(function() {
      searchPlace(q, results, function(place) {
        const lat = parseFloat(place.lat);
        const lng = parseFloat(place.lon);
        const name = place.display_name.split(',').slice(0, 2).join(',');
        input.value = name;
        results.style.display = 'none';
        results.innerHTML = '';
        if (kind === 'origin') setOrigin(lat, lng, name);
        else setDest(lat, lng, name);
        map.easeTo({ center: [lng, lat], zoom: 15, duration: 600 });
      });
    }, 450);
  });
}

async function searchPlace(query, resultsEl, onPick) {
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = '<div class="result"><div class="result-name">Searching...</div></div>';
  const url = 'https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(query) +
    '&format=json&limit=6&viewbox=79.8,12.3,80.5,13.5&bounded=0&countrycodes=in&addressdetails=1&accept-language=en';
  try {
    const r = await fetch(url, { headers: { 'User-Agent': 'PrivNav/2.0' } });
    const data = await r.json();
    resultsEl.innerHTML = '';
    if (!data.length) {
      resultsEl.innerHTML = '<div class="result"><div class="result-name">No results</div></div>';
      return;
    }
    data.forEach(function(place) {
      const item = document.createElement('div');
      item.className = 'result';
      const parts = place.display_name.split(',');
      item.innerHTML = '<div class="result-name">' + parts.slice(0, 2).join(',') + '</div>' +
        '<div class="result-addr">' + place.display_name + '</div>';
      item.addEventListener('click', function() { onPick(place); });
      resultsEl.appendChild(item);
    });
  } catch (e) {
    resultsEl.innerHTML = '<div class="result"><div class="result-name">Search failed</div></div>';
    dbg('Search failed: ' + e.message);
  }
}

/* ── Markers ───────────────────────────────────────── */
function makeHtmlMarker(html, lng, lat) {
  const el = document.createElement('div');
  el.innerHTML = html;
  return new maplibregl.Marker({ element: el }).setLngLat([lng, lat]).addTo(map);
}

function setOrigin(lat, lng, label) {
  origin = { lat, lng, label };
  if (originMarker) originMarker.remove();
  originMarker = makeHtmlMarker('<div class="pin" style="background:#2ecc71"><span>O</span></div>', lng, lat);
  $('origin-input').value = label || (lat.toFixed(5) + ', ' + lng.toFixed(5));
}

function setDest(lat, lng, label) {
  dest = { lat, lng, label };
  if (destMarker) destMarker.remove();
  destMarker = makeHtmlMarker('<div class="pin" style="background:#e74c3c"><span>D</span></div>', lng, lat);
  $('dest-input').value = label || (lat.toFixed(5) + ', ' + lng.toFixed(5));
}

/* ── GPS ───────────────────────────────────────────── */
function startGps() {
  if (!navigator.geolocation) { setPill('pill-gps', 'err', 'NO GEOLOCATION'); return; }
  setPill('pill-gps', 'active', 'LOCATING');
  if (gpsWatchId === null) {
    gpsWatchId = navigator.geolocation.watchPosition(onGps, onGpsError, GPS_WATCH_OPTIONS);
  }
  if (gpsPollTimer === null) {
    pollGpsOnce();
    gpsPollTimer = setInterval(pollGpsOnce, GPS_POLL_MS);
  }
}

function pollGpsOnce() {
  if (!navigator.geolocation || gpsPollInFlight) return;
  gpsPollInFlight = true;
  navigator.geolocation.getCurrentPosition(
    function(pos) { gpsPollInFlight = false; onGps(pos); },
    function(err) { gpsPollInFlight = false; onGpsError(err); },
    { enableHighAccuracy: true, maximumAge: 0, timeout: GPS_TIMEOUT_MS }
  );
}

function onGps(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const acc = Math.round(pos.coords.accuracy || 0);
  userLat = lat;
  userLng = lng;
  lastAccuracy = acc;
  setPill('pill-gps', acc < 80 ? 'ok' : 'warn', lat.toFixed(4) + ',' + lng.toFixed(4) + ' +' + acc + 'm');
  updateGpsMarker(lat, lng, acc);
  if (!origin) setOrigin(lat, lng, 'Current GPS');

  if (pendingFlyToGps && !navActive) {
    pendingFlyToGps = false;
    $('origin-gps').classList.remove('active');
    if (!origin || origin.label === 'Current GPS') setOrigin(lat, lng, 'Current GPS');
    flyToGpsWithSplash(lat, lng);
  }
  if (navActive) onNavPosition(pos);
}

function onGpsError(err) {
  $('origin-gps').classList.remove('active');
  setPill('pill-gps', err.code === err.PERMISSION_DENIED ? 'err' : 'warn', err.message || 'GPS ERROR');
  dbg('GPS error: ' + err.message);
}

function updateGpsMarker(lat, lng, acc) {
  if (!gpsMarker) {
    gpsMarker = makeHtmlMarker('<div class="gps-dot"></div>', lng, lat);
  } else {
    gpsMarker.setLngLat([lng, lat]);
  }
  if (accuracySourceReady) {
    map.getSource('accuracy').setData(
      acc > 30 ? circleFeature(lat, lng, acc) : { type: 'FeatureCollection', features: [] }
    );
  }
}

function useGpsOrigin() {
  if (userLat === null) {
    pendingFlyToGps = true;
    $('origin-gps').classList.add('active');
    startGps();
    toast('Getting GPS...');
    return;
  }
  setOrigin(userLat, userLng, 'Current GPS');
  flyToGpsWithSplash(userLat, userLng);
}

/* ── Routing ───────────────────────────────────────── */
async function calculateRoute() {
  if (!origin || !dest) { toast('Set origin and destination first'); return; }
  const url = 'https://graphhopper.com/api/1/route?point=' + origin.lat + ',' + origin.lng +
    '&point=' + dest.lat + ',' + dest.lng +
    '&vehicle=car&locale=en&points_encoded=false&instructions=true&calc_points=true&key=' + GH_KEY;
  setPill('pill-camera', 'active', 'ROUTING');
  hideRoutePreview();
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('GraphHopper ' + r.status);
    currentRoute = await r.json();
    const path = currentRoute.paths[0];
    routeCoords = path.points.coordinates.map(function(c) { return [c[1], c[0]]; });
    routeTotalDistance = path.distance || polylineLength(routeCoords);
    routeTotalTimeSecs = path.time ? path.time / 1000 : 0;
    navSteps = extractSteps(path);
    navStep = 0;
    map.getSource('route').setData(lineFeature(routeCoords));
    map.getSource('traffic-route').setData({ type: 'FeatureCollection', features: [] });
    trafficColors = [];
    fitRoute(routeCoords);
    setPill('pill-camera', '', 'ROUTE READY');
    showRoutePreview();
  } catch (e) {
    setPill('pill-camera', 'err', 'ROUTE ERROR');
    toast('Route failed');
    dbg(e.message);
  }
}

function extractSteps(path) {
  return (path.instructions || []).map(function(inst, idx) {
    return {
      instruction: stripHtml(inst.text || 'Continue'),
      distance: inst.distance || 0,
      interval: inst.interval || [0, 0],
      sign: inst.sign || 0,
      distFromStart: inst.interval ? polylineLength(routeCoords.slice(0, inst.interval[0] + 1)) : 0,
      idx: idx
    };
  });
}

function stripHtml(s) {
  const div = document.createElement('div');
  div.innerHTML = s;
  return div.textContent || div.innerText || s;
}

function fitRoute(coords) {
  const bounds = new maplibregl.LngLatBounds();
  coords.forEach(function(c) { bounds.extend(toLngLat(c)); });
  map.fitBounds(bounds, { padding: 70, duration: 700 });
}

/* ── Navigation ────────────────────────────────────── */
function toggleNavigation() {
  if (navActive) stopNavigation();
  else if (currentRoute && routeCoords.length) showRoutePreview();
  else toast('Calculate a route first');
}

async function startNavigation() {
  if (!currentRoute || !routeCoords.length) { toast('Calculate a route first'); return; }
  startGps();
  navActive = true;
  following = true;
  navStep = 0;
  $('nav-hud').classList.add('active');
  $('panel').classList.add('nav-mode');
  $('nav-btn').textContent = 'Stop';
  $('nav-btn').classList.add('danger');
  $('recentre').classList.remove('visible');
  $('nav-stop-float').classList.add('visible');

  // Fade full route so only traffic-colored ahead portion dominates
  map.setPaintProperty('route-line',   'line-opacity', 0.18);
  map.setPaintProperty('route-casing', 'line-opacity', 0.18);
  // Reset traffic + off-route state; trigger immediate fetch on first syncNavigation
  lastTrafficRouteUpdate = 0;
  offRouteCount = 0;
  lastOffRouteWarnTime = 0;

  // Voice — called from button click, safe on iOS
  lastSpokenStep = -1;
  voiceThresholdsFired = {};
  speak('Navigation started. ' + (navSteps[0] ? navSteps[0].instruction : ''));
  startIosTtsKeepalive();

  // 3D is handled by NAV_PITCH; update button state
  setPill('pill-camera', 'active', 'HEADING-UP');
  startHeading();
  await acquireWakeLock();
  if (userLat !== null) {
    map.easeTo({ center: [userLng, userLat], zoom: NAV_ZOOM, pitch: is3D ? 55 : NAV_PITCH, bearing: headingSmoothed, duration: 700 });
  }
  updateHud(0, 0);
}

function stopNavigation() {
  navActive = false;
  $('nav-hud').classList.remove('active');
  $('panel').classList.remove('nav-mode');
  $('nav-btn').textContent = 'Navigate';
  $('nav-btn').classList.remove('danger');
  $('recentre').classList.remove('visible');
  $('nav-stop-float').classList.remove('visible');
  hideRoutePreview();

  if (window.speechSynthesis) window.speechSynthesis.cancel();
  stopIosTtsKeepalive();
  lastSpokenStep = -1;
  voiceThresholdsFired = {};

  // Restore full route appearance and clear traffic overlay
  map.setPaintProperty('route-line',   'line-opacity', 0.95);
  map.setPaintProperty('route-casing', 'line-opacity', 0.9);
  map.getSource('traffic-route').setData({ type: 'FeatureCollection', features: [] });
  offRouteCount = 0;

  map.easeTo({ pitch: is3D ? 45 : 0, bearing: 0, duration: 700 });
  setPill('pill-camera', '', 'NORTH-UP');
  stopHeading();
  if (wakeLock) { wakeLock.release().catch(function(){}); wakeLock = null; }
}

function recentre() {
  if (userLat === null) return;
  following = true;
  $('recentre').classList.remove('visible');
  map.easeTo({ center: [userLng, userLat], zoom: NAV_ZOOM, pitch: is3D ? 55 : NAV_PITCH, bearing: headingSmoothed, duration: 500 });
}

function onNavPosition(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const bearing = pos.coords.heading !== null && !isNaN(pos.coords.heading)
    ? pos.coords.heading
    : gpsHeadingFromPositions(lat, lng);
  if (bearing !== null) smoothHeading(bearing);
  if (following) {
    map.easeTo({
      center: [lng, lat],
      zoom: NAV_ZOOM,
      pitch: is3D ? 55 : NAV_PITCH,
      bearing: headingSmoothed,
      duration: 650,
      easing: function(t) { return t; }
    });
  }
  syncNavigation(lat, lng);
}

function syncNavigation(lat, lng) {
  if (!routeCoords.length || !navSteps.length) return;
  const closest = findClosestRoutePoint(lat, lng);
  const remaining = routeCoords.slice(closest.closestIdx);

  // Update traffic-colored ahead portion
  map.getSource('traffic-route').setData({
    type: 'FeatureCollection',
    features: buildColoredFeatures(remaining, closest.closestIdx)
  });

  // Throttled traffic color refresh (every TRAFFIC_REFRESH_MS)
  if (Date.now() - lastTrafficRouteUpdate > TRAFFIC_REFRESH_MS) {
    lastTrafficRouteUpdate = Date.now();
    fetchAndUpdateTrafficColors(closest.closestIdx);
  }

  const progress = polylineLength(routeCoords.slice(0, closest.closestIdx + 1));
  for (let i = 0; i < navSteps.length; i++) {
    if (navSteps[i].distFromStart <= progress + 10) navStep = Math.min(i, navSteps.length - 1);
  }
  const next = navSteps[navStep] || { instruction: 'Continue', distFromStart: progress };
  const distToManeuver = Math.max(0, next.distFromStart - progress);
  const remainDist = polylineLength(remaining);
  updateHud(navStep, distToManeuver, remainDist);
  announceNavUpdate(navStep, progress);

  // Off-route: accuracy-aware threshold + must see 5 consecutive bad readings + 2 min cooldown
  const threshold = lastAccuracy ? Math.max(50, lastAccuracy * 1.5) : 50;
  if (closest.distToRoute > threshold) {
    offRouteCount++;
    if (offRouteCount >= 5 && Date.now() - lastOffRouteWarnTime > 120000) {
      lastOffRouteWarnTime = Date.now();
      toast('Possible off route — recalculate if needed');
    }
  } else {
    offRouteCount = 0;
  }
}

function updateHud(stepIdx, distToManeuver, remainDist) {
  const step = navSteps[stepIdx] || { instruction: 'Continue', sign: 0 };
  $('nav-instruction').textContent = step.instruction;
  $('nav-distance').textContent = formatDist(distToManeuver || 0);
  $('nav-arrow').textContent = arrowForSign(step.sign);
  const left = remainDist !== undefined ? remainDist : routeTotalDistance;
  $('meta-dist').textContent = formatDist(left);
  $('meta-step').textContent = navSteps.length ? (stepIdx + 1) + '/' + navSteps.length : '--';
  const etaSecs = routeTotalDistance > 0 && routeTotalTimeSecs > 0
    ? routeTotalTimeSecs * (left / routeTotalDistance) : 0;
  $('meta-eta').textContent = etaSecs
    ? new Date(Date.now() + etaSecs * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    : '--:--';
}

function arrowForSign(sign) {
  if (sign === -2 || sign === -3) return '↰';
  if (sign === 2  || sign === 3)  return '↱';
  if (sign === 4) return '↻';
  if (sign === 5) return '↺';
  if (sign === 6) return '↩';
  return '↑';
}

/* ── Compass / Heading ─────────────────────────────── */
function startHeading() {
  if (!window.DeviceOrientationEvent) return;
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(function(state) {
      if (state === 'granted') {
        window.addEventListener('deviceorientationabsolute', onOrientation, true);
        window.addEventListener('deviceorientation', onOrientation, true);
      }
    }).catch(function(){});
  } else {
    window.addEventListener('deviceorientationabsolute', onOrientation, true);
    window.addEventListener('deviceorientation', onOrientation, true);
  }
}

function stopHeading() {
  window.removeEventListener('deviceorientationabsolute', onOrientation, true);
  window.removeEventListener('deviceorientation', onOrientation, true);
  compassAvailable = false;
  headingHistory = [];
  lastGpsLat = null;
  lastGpsLng = null;
}

function onOrientation(e) {
  let heading = null;
  if (e.absolute && e.alpha !== null) heading = 360 - e.alpha;
  else if (e.webkitCompassHeading !== undefined) heading = e.webkitCompassHeading;
  if (heading !== null && !isNaN(heading)) { compassAvailable = true; smoothHeading(heading); }
}

function gpsHeadingFromPositions(lat, lng) {
  if (lastGpsLat === null) { lastGpsLat = lat; lastGpsLng = lng; return null; }
  if (haversine(lastGpsLat, lastGpsLng, lat, lng) < 6) return null;
  const dLng = (lng - lastGpsLng) * Math.PI / 180;
  const lat1 = lastGpsLat * Math.PI / 180;
  const lat2 = lat * Math.PI / 180;
  const y = Math.sin(dLng) * Math.cos(lat2);
  const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
  lastGpsLat = lat; lastGpsLng = lng;
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function smoothHeading(heading) {
  headingHistory.push(heading);
  if (headingHistory.length > 6) headingHistory.shift();
  let sin = 0, cos = 0;
  headingHistory.forEach(function(h) {
    sin += Math.sin(h * Math.PI / 180);
    cos += Math.cos(h * Math.PI / 180);
  });
  headingSmoothed = (Math.atan2(sin, cos) * 180 / Math.PI + 360) % 360;
  if (navActive) setPill('pill-camera', 'active', Math.round(headingSmoothed) + ' deg');
}

/* ── Geometry helpers ──────────────────────────────── */
function pointToSegmentDist(lat, lng, p0, p1) {
  // Flat-earth projection — accurate enough for segments < ~20 km
  const cosLat = Math.cos(lat * Math.PI / 180);
  const x  = (lng  - p0[1]) * cosLat * 111320;
  const y  = (lat  - p0[0]) * 111320;
  const dx = (p1[1] - p0[1]) * cosLat * 111320;
  const dy = (p1[0] - p0[0]) * 111320;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.sqrt(x * x + y * y);
  const t  = Math.max(0, Math.min(1, (x * dx + y * dy) / lenSq));
  return Math.sqrt((x - t * dx) ** 2 + (y - t * dy) ** 2);
}

/* ── Traffic route coloring ────────────────────────── */
function ratioToTrafficColor(ratio) {
  if (ratio > 0.75) return '#4f8ef7'; // free  — blue
  if (ratio > 0.45) return '#f1c40f'; // slow  — yellow
  return '#e74c3c';                   // jam   — red
}

async function fetchFlowForPoint(lat, lng) {
  try {
    const url = 'https://api.tomtom.com/traffic/services/4/flowSegmentData/absolute/10/json' +
      '?key=' + TT_KEY + '&point=' + lat + ',' + lng + '&unit=KMPH';
    const ctrl = new AbortController();
    const tid = setTimeout(function() { ctrl.abort(); }, 6000);
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(tid);
    if (!r.ok) return 1;
    const data = await r.json();
    const seg = data.flowSegmentData;
    if (!seg || !seg.freeFlowSpeed || seg.freeFlowSpeed === 0) return 1;
    return Math.min(1, Math.max(0, seg.currentSpeed / seg.freeFlowSpeed));
  } catch(e) { return 1; }
}

async function fetchAndUpdateTrafficColors(fromIdx) {
  if (!routeCoords.length) return;
  const segment = routeCoords.slice(fromIdx);
  if (segment.length < 2) return;

  // Up to 8 evenly-spaced sample points along the remaining route
  const totalLen = polylineLength(segment);
  const interval = Math.max(400, totalLen / 8);
  const samples = [{ coord: segment[0], routeIdx: fromIdx }];
  let accumulated = 0;
  for (let i = 1; i < segment.length; i++) {
    accumulated += haversine(segment[i-1][0], segment[i-1][1], segment[i][0], segment[i][1]);
    if (accumulated >= interval) {
      samples.push({ coord: segment[i], routeIdx: fromIdx + i });
      accumulated = 0;
    }
  }

  const results = await Promise.all(samples.map(async function(s) {
    const ratio = await fetchFlowForPoint(s.coord[0], s.coord[1]);
    return { routeIdx: s.routeIdx, ratio: ratio };
  }));

  // Paint each route coord with the color of its nearest sample
  for (let i = fromIdx; i < routeCoords.length; i++) {
    let bestRatio = 1, bestDist = Infinity;
    for (let j = 0; j < results.length; j++) {
      const d = haversine(routeCoords[i][0], routeCoords[i][1],
                          routeCoords[results[j].routeIdx][0], routeCoords[results[j].routeIdx][1]);
      if (d < bestDist) { bestDist = d; bestRatio = results[j].ratio; }
    }
    trafficColors[i] = ratioToTrafficColor(bestRatio);
  }

  // Redraw ahead portion if navigating
  if (navActive && userLat !== null) {
    const cl = findClosestRoutePoint(userLat, userLng);
    const rem = routeCoords.slice(cl.closestIdx);
    map.getSource('traffic-route').setData({
      type: 'FeatureCollection',
      features: buildColoredFeatures(rem, cl.closestIdx)
    });
  }
}

function buildColoredFeatures(remaining, startIdx) {
  if (remaining.length < 2) return [];
  const features = [];
  let currentColor = trafficColors[startIdx] || '#4f8ef7';
  let seg = [remaining[0]];
  for (let i = 1; i < remaining.length; i++) {
    const color = trafficColors[startIdx + i] || '#4f8ef7';
    if (color === currentColor) {
      seg.push(remaining[i]);
    } else {
      if (seg.length >= 2) features.push(coloredLineFeature(seg, currentColor));
      currentColor = color;
      seg = [remaining[i - 1], remaining[i]]; // 1-coord overlap closes gaps
    }
  }
  if (seg.length >= 2) features.push(coloredLineFeature(seg, currentColor));
  return features;
}

function coloredLineFeature(latLngs, color) {
  return {
    type: 'Feature',
    properties: { color: color },
    geometry: { type: 'LineString', coordinates: latLngs.map(toLngLat) }
  };
}

/* ── Traffic ───────────────────────────────────────── */
async function refreshTraffic() {
  if (!map.getLayer('tomtom-flow')) return;
  map.setPaintProperty('tomtom-flow', 'raster-opacity', 0.72);
  setPill('pill-traffic', 'active', 'FETCHING');
  const lat = userLat || 13.0827;
  const lng = userLng || 80.2707;
  const delta = 0.035;
  try {
    const url = 'https://api.tomtom.com/traffic/services/5/incidentDetails' +
      '?key=' + TT_KEY +
      '&bbox=' + (lng - delta) + ',' + (lat - delta) + ',' + (lng + delta) + ',' + (lat + delta) +
      '&fields={incidents{type,geometry{type,coordinates},properties{iconCategory,magnitudeOfDelay,events{description,code},from,to,roadNumbers,delay}}}&language=en-US&timeValidityFilter=present';
    const r = await fetch(url);
    const data = await r.json();
    renderIncidents((data.incidents || []).slice(0, 20));
    setPill('pill-traffic', 'ok', 'LIVE ' + (data.incidents || []).length);
  } catch (e) {
    setPill('pill-traffic', 'err', 'ERROR');
    dbg('Traffic error: ' + e.message);
  }
}

function renderIncidents(incidents) {
  incidentMarkers.forEach(function(m) { m.remove(); });
  incidentMarkers = [];
  incidents.forEach(function(inc) {
    const coords = inc.geometry && inc.geometry.coordinates;
    if (!coords) return;
    let lng, lat;
    if (inc.geometry.type === 'Point') { lng = coords[0]; lat = coords[1]; }
    else if (Array.isArray(coords[0])) { lng = coords[0][0]; lat = coords[0][1]; }
    if (!lat || !lng) return;
    const marker = makeHtmlMarker(
      '<div class="incident-marker">' + incidentIcon(inc.properties && inc.properties.iconCategory) + '</div>',
      lng, lat
    );
    const desc = inc.properties && inc.properties.events && inc.properties.events[0]
      ? inc.properties.events[0].description : 'Traffic incident';
    marker.setPopup(new maplibregl.Popup({ offset: 20 }).setHTML('<b>' + desc + '</b>'));
    incidentMarkers.push(marker);
  });
}

function incidentIcon(type) {
  const n = String(type || '').toLowerCase();
  if (n.includes('accident')) return '!';
  if (n.includes('road'))     return 'x';
  if (n.includes('jam'))      return '~';
  return '!';
}

/* ── Helpers ───────────────────────────────────────── */
async function acquireWakeLock() {
  try {
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
  } catch (e) { dbg('Wake lock failed: ' + e.message); }
}

document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible' && navActive) { acquireWakeLock(); pollGpsOnce(); }
});

function findClosestRoutePoint(lat, lng) {
  let bestIdx = 0, bestDist = Infinity;
  // Project onto each segment rather than just measuring to vertices
  for (let i = 0; i < routeCoords.length - 1; i++) {
    const d = pointToSegmentDist(lat, lng, routeCoords[i], routeCoords[i + 1]);
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  }
  // Check final vertex
  if (routeCoords.length > 1) {
    const dLast = haversine(lat, lng,
      routeCoords[routeCoords.length - 1][0], routeCoords[routeCoords.length - 1][1]);
    if (dLast < bestDist) { bestDist = dLast; bestIdx = routeCoords.length - 1; }
  }
  return { closestIdx: bestIdx, distToRoute: bestDist };
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000, toRad = Math.PI / 180;
  const dLat = (lat2 - lat1) * toRad, dLon = (lon2 - lon1) * toRad;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toRad)*Math.cos(lat2*toRad)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function polylineLength(coords) {
  let total = 0;
  for (let i = 1; i < coords.length; i++)
    total += haversine(coords[i-1][0], coords[i-1][1], coords[i][0], coords[i][1]);
  return total;
}

function formatDist(m) {
  if (!isFinite(m)) return '--';
  if (m < 1000) return Math.round(m) + ' m';
  return (m / 1000).toFixed(m < 10000 ? 1 : 0) + ' km';
}

window.addEventListener('load', initMap);
</script>
